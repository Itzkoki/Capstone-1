<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles | Barcarse Psychological Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="articles.css">
  <link rel="stylesheet" href="staff-management.css">
  <style>
    .pending-section { margin-bottom: 32px; }
    .pending-section__title {
      font-size: 18px; font-weight: 700; color: #e53e3e;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .pending-badge {
      background: #e53e3e; color: #fff; border-radius: 20px;
      font-size: 12px; padding: 2px 10px; font-weight: 600;
    }
    .article-card--pending { border-left: 4px solid #e53e3e; }
    .article-card__status {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 12px; text-transform: uppercase;
    }
    .article-card__status--pending { background: #fff3cd; color: #856404; }
    .article-card__status--approved { background: #d4edda; color: #155724; }
    .article-card__status--rejected { background: #f8d7da; color: #721c24; }
    .btn-sm--approve {
      background: #34c759; color: #fff; border: none; padding: 6px 16px;
      border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px;
    }
    .btn-sm--approve:hover { background: #2da44e; }
    .btn-sm--reject {
      background: #e53e3e; color: #fff; border: none; padding: 6px 16px;
      border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px;
    }
    .btn-sm--reject:hover { background: #c53030; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 8px 20px; border: 2px solid #e2e8f0; border-radius: 10px;
      background: #fff; cursor: pointer; font-weight: 600; font-size: 14px; color: #4a5568;
      transition: all 0.2s;
    }
    .tab-btn.active { border-color: var(--green-primary); color: var(--green-primary); background: rgba(52,199,89,0.06); }
    .tab-btn:hover { border-color: var(--green-primary); }
  </style>
</head>
<body class="articles-page logged-in">
  <nav class="navbar"><a href="landingpage.html" class="navbar__brand"><div class="navbar__logo"><img src="barcarse logo.jpg" alt="BPS Logo"></div><span class="navbar__title">Barcarse Psychological Services</span></a>
    <div class="navbar__right"><ul class="navbar__links"><li><a href="admin-dashboard.html">Dashboard</a></li><li><a href="articles.html" style="color:var(--green-primary)">Articles</a></li><li><a href="meetings.html">Meetings</a></li><li><a href="intake-submissions.html">Intake Forms</a></li><li><a href="community.html">Community</a></li></ul><a href="profile.html" class="navbar__profile"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></a></div>
  </nav>

  <div class="articles-container">
    <div class="articles-header">
      <h1 class="articles-header__title">Articles Repository</h1>
      <div style="display:flex;gap:10px;">
        <button class="btn-create" id="btn-import" style="display:none;background:linear-gradient(135deg,#4299e1,#3182ce);" onclick="toggleImportModal()"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg> Import from URL</button>
        <button class="btn-create" onclick="toggleForm()"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> New Article</button>
      </div>
    </div>

    <div class="article-form" id="article-form">
      <h3 class="article-form__title" id="form-title">Create Article</h3>
      <input type="text" id="art-title" placeholder="Article title">
      <textarea id="art-content" placeholder="Write your article content..."></textarea>
      <div class="form-actions">
        <button class="btn-modal btn-modal--cancel" onclick="cancelForm()">Cancel</button>
        <button class="btn-modal btn-modal--primary" id="save-btn" onclick="saveArticle()">Submit</button>
      </div>
    </div>

    <!-- Import from URL Modal -->
    <div class="article-form" id="import-modal" style="border-left:4px solid #4299e1;">
      <h3 class="article-form__title" style="color:#4299e1;">📎 Import Article from URL</h3>
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <input type="text" id="import-url" placeholder="Paste article URL here (e.g. https://example.com/article)" style="flex:1;">
        <button class="btn-modal btn-modal--primary" id="fetch-btn" onclick="fetchArticlePreview()" style="background:#4299e1;white-space:nowrap;">Fetch Article</button>
      </div>
      <div id="import-status" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;"></div>
      <div id="import-preview" style="display:none;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4299e1;margin-bottom:8px;">Preview & Edit</div>
        <input type="text" id="import-title" placeholder="Article title" style="margin-bottom:8px;">
        <div style="display:flex;gap:10px;margin-bottom:8px;">
          <input type="text" id="import-author" placeholder="Author name" style="flex:1;">
          <input type="text" id="import-category" placeholder="Category (e.g. Mental Health)" style="flex:1;">
        </div>
        <div id="import-image-preview" style="display:none;margin-bottom:10px;border-radius:8px;overflow:hidden;max-height:200px;"></div>
        <textarea id="import-content" placeholder="Article content..." style="min-height:200px;"></textarea>
        <input type="hidden" id="import-source-url">
        <input type="hidden" id="import-featured-image">
        <input type="hidden" id="import-published-date">
        <div class="form-actions">
          <button class="btn-modal btn-modal--cancel" onclick="cancelImport()">Cancel</button>
          <button class="btn-modal btn-modal--primary" onclick="publishImportedArticle()" style="background:#4299e1;">Publish Article</button>
        </div>
      </div>
    </div>

    <!-- Tab bar for staff to switch between published and pending -->
    <div class="tab-bar" id="tab-bar" style="display:none;">
      <button class="tab-btn active" onclick="switchTab('published', this)">Published</button>
      <button class="tab-btn" onclick="switchTab('pending', this)">
        Pending Review <span class="pending-badge" id="pending-count" style="display:none;">0</span>
      </button>
    </div>

    <div id="articles-list"></div>
  </div>

  <script src="session.js"></script>
  <script>
    const API = 'http://localhost:5000/api';
    const token = BPSSession.getToken();
    const user = BPSSession.getUser();
    const isStaff = user.role && user.role !== 'client';

    let editingId = null;
    let currentTab = 'published';

    async function apiFetch(url, opts = {}) {
      const res = await fetch(`${API}${url}`, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers } });
      if (res.status === 401) { window.location.href = 'login.html'; }
      return res.json();
    }

    function timeAgo(d) {
      const diff = Date.now()-new Date(d).getTime();
      const m=Math.floor(diff/60000);if(m<60)return m+'m ago';
      const h=Math.floor(m/60);if(h<24)return h+'h ago';
      return Math.floor(h/24)+'d ago';
    }

    // Show tab bar and import button for staff
    if (isStaff) {
      document.getElementById('tab-bar').style.display = 'flex';
      document.getElementById('btn-import').style.display = 'flex';
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadArticles();
    }

    function toggleForm() {
      editingId = null;
      document.getElementById('form-title').textContent = 'Create Article';
      document.getElementById('art-title').value = '';
      document.getElementById('art-content').value = '';
      document.getElementById('save-btn').textContent = 'Submit';
      document.getElementById('article-form').classList.toggle('active');
      document.getElementById('import-modal').classList.remove('active');
    }

    function cancelForm() {
      document.getElementById('article-form').classList.remove('active');
      editingId = null;
    }

    function editArticle(id, title, content) {
      editingId = id;
      document.getElementById('form-title').textContent = 'Edit Article';
      document.getElementById('art-title').value = title;
      document.getElementById('art-content').value = content;
      document.getElementById('save-btn').textContent = 'Update';
      document.getElementById('article-form').classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveArticle() {
      const title = document.getElementById('art-title').value.trim();
      const content = document.getElementById('art-content').value.trim();
      if (!title || !content) return alert('Title and content are required.');

      if (editingId) {
        await apiFetch(`/articles/${editingId}`, { method: 'PUT', body: JSON.stringify({ title, content }) });
      } else {
        await apiFetch('/articles', { method: 'POST', body: JSON.stringify({ title, content }) });
        if (!isStaff) {
          alert('Your article has been submitted for review. You will be notified once it is approved.');
        }
      }
      cancelForm();
      loadArticles();
    }

    async function deleteArticle(id) {
      if (!confirm('Delete this article?')) return;
      await apiFetch(`/articles/${id}`, { method: 'DELETE' });
      loadArticles();
    }

    async function approveArticle(id) {
      await apiFetch(`/articles/${id}/approve`, { method: 'PUT' });
      loadArticles();
    }

    async function rejectArticle(id) {
      if (!confirm('Reject this article? The author will be notified.')) return;
      await apiFetch(`/articles/${id}/reject`, { method: 'PUT' });
      loadArticles();
    }

    // ===== ARTICLE IMPORT =====
    function toggleImportModal() {
      const modal = document.getElementById('import-modal');
      modal.classList.toggle('active');
      document.getElementById('article-form').classList.remove('active');
      // Reset state
      document.getElementById('import-url').value = '';
      document.getElementById('import-preview').style.display = 'none';
      document.getElementById('import-status').style.display = 'none';
    }

    function cancelImport() {
      document.getElementById('import-modal').classList.remove('active');
      document.getElementById('import-preview').style.display = 'none';
      document.getElementById('import-status').style.display = 'none';
    }

    function showImportStatus(msg, type) {
      const el = document.getElementById('import-status');
      el.textContent = msg;
      el.style.display = 'block';
      if (type === 'error') {
        el.style.background = '#fff5f5'; el.style.color = '#c53030'; el.style.border = '1px solid #feb2b2';
      } else if (type === 'success') {
        el.style.background = '#f0fff4'; el.style.color = '#276749'; el.style.border = '1px solid #9ae6b4';
      } else {
        el.style.background = '#ebf8ff'; el.style.color = '#2b6cb0'; el.style.border = '1px solid #bee3f8';
      }
    }

    async function fetchArticlePreview() {
      const url = document.getElementById('import-url').value.trim();
      if (!url) { showImportStatus('Please paste a URL first.', 'error'); return; }

      const fetchBtn = document.getElementById('fetch-btn');
      fetchBtn.disabled = true;
      fetchBtn.textContent = 'Fetching...';
      showImportStatus('Fetching article content... This may take a few seconds.', 'info');
      document.getElementById('import-preview').style.display = 'none';

      try {
        const json = await apiFetch('/articles/import/preview', {
          method: 'POST',
          body: JSON.stringify({ url }),
        });

        if (!json.success) {
          showImportStatus(json.message || 'Failed to fetch article.', 'error');
          return;
        }

        const d = json.data;
        document.getElementById('import-title').value = d.title || '';
        document.getElementById('import-author').value = d.author || '';
        document.getElementById('import-category').value = '';
        document.getElementById('import-content').value = d.contentText || d.content || '';
        document.getElementById('import-source-url').value = d.sourceUrl || url;
        document.getElementById('import-featured-image').value = d.featuredImage || '';
        document.getElementById('import-published-date').value = d.publishedDate || '';

        // Show image preview if available
        const imgPreview = document.getElementById('import-image-preview');
        if (d.featuredImage) {
          imgPreview.innerHTML = `<img src="${d.featuredImage}" style="width:100%;max-height:200px;object-fit:cover;" onerror="this.parentElement.style.display='none'">`;
          imgPreview.style.display = 'block';
        } else {
          imgPreview.style.display = 'none';
        }

        document.getElementById('import-preview').style.display = 'block';
        showImportStatus('Article extracted successfully! Review and edit below before publishing.', 'success');
      } catch (err) {
        showImportStatus('Failed to fetch article: ' + (err.message || 'Unknown error'), 'error');
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.textContent = 'Fetch Article';
      }
    }

    async function publishImportedArticle() {
      const title = document.getElementById('import-title').value.trim();
      const content = document.getElementById('import-content').value.trim();
      const source_url = document.getElementById('import-source-url').value.trim();

      if (!title || !content) { showImportStatus('Title and content are required.', 'error'); return; }

      try {
        const json = await apiFetch('/articles/import/publish', {
          method: 'POST',
          body: JSON.stringify({
            title,
            content,
            source_url,
            featured_image: document.getElementById('import-featured-image').value || null,
            original_author: document.getElementById('import-author').value.trim() || null,
            published_date: document.getElementById('import-published-date').value || null,
            category: document.getElementById('import-category').value.trim() || null,
          }),
        });

        if (json.success) {
          showImportStatus('Article imported and published successfully!', 'success');
          setTimeout(() => { cancelImport(); loadArticles(); }, 1500);
        } else {
          showImportStatus(json.message || 'Failed to publish article.', 'error');
        }
      } catch (err) {
        showImportStatus('Failed to publish: ' + (err.message || 'Unknown error'), 'error');
      }
    }

    async function loadArticles() {
      const endpoint = (isStaff && currentTab === 'pending') ? '/articles/pending' : '/articles';
      const data = await apiFetch(endpoint);
      const list = document.getElementById('articles-list');

      // Load pending count for badge
      if (isStaff) {
        const pendingData = await apiFetch('/articles/pending');
        const count = pendingData.success ? pendingData.data.length : 0;
        const badge = document.getElementById('pending-count');
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      }

      if (!data.success || !data.data.length) {
        const msg = currentTab === 'pending'
          ? 'No articles pending review.'
          : 'No published articles yet. Create your first one!';
        list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><p>${msg}</p></div>`;
        return;
      }

      list.innerHTML = data.data.map(a => {
        const isPending = a.status === 'pending';
        const statusBadge = a.status ? `<span class="article-card__status article-card__status--${a.status}">${a.status}</span>` : '';
        const importBadge = a.source_url ? '<span class="article-card__status" style="background:#ebf8ff;color:#2b6cb0;">IMPORTED</span>' : '';

        // Action buttons depend on role and status
        let actions = '';
        if (isStaff && isPending) {
          actions = `
            <button class="btn-sm--approve" onclick="approveArticle(${a.id})">✓ Approve & Publish</button>
            <button class="btn-sm--reject" onclick="rejectArticle(${a.id})">✕ Reject</button>
            <button class="btn-sm btn-sm--danger" onclick="deleteArticle(${a.id})">Delete</button>
          `;
        } else if (isStaff) {
          actions = `
            <button class="btn-sm btn-sm--edit" onclick="editArticle(${a.id},\`${a.title.replace(/`/g,"\\`")}\`,\`${(a.content||'').replace(/`/g,"\\`")}\`)">Edit</button>
            <button class="btn-sm btn-sm--danger" onclick="deleteArticle(${a.id})">Delete</button>
          `;
        }

        const authorDisplay = a.original_author ? `${a.original_author} (imported by ${a.author_name})` : a.author_name;

        return `
          <div class="article-card ${isPending ? 'article-card--pending' : ''}">
            <div class="article-card__header">
              <h2 class="article-card__title">${a.title} ${statusBadge} ${importBadge}</h2>
            </div>
            <div class="article-card__meta">By ${authorDisplay} • ${timeAgo(a.created_at)}</div>
            <div class="article-card__content">${(a.content||'').length > 400 ? a.content.substring(0,400)+'...' : (a.content||'')}</div>
            <div class="article-card__actions">${actions}</div>
          </div>
        `;
      }).join('');
    }

    loadArticles();
  </script>
</body>
</html>
