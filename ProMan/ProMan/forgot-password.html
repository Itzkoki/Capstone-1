<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Barcarse Psychological Services</title>
  <meta name="description" content="Reset your password for Barcarse Psychological Services.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="auth-page">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="landingpage.html" class="navbar__brand">
      <div class="navbar__logo">
        <img src="barcarse logo.jpg" alt="BPS Logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <span class="navbar__title">Barcarse Psychological Services</span>
    </a>
    <div class="navbar__right">
      <ul class="navbar__links">
        <li><a href="landingpage.html#cta">Booking</a></li>
        <li><a href="landingpage.html#cta">Inquiry</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== FORGOT PASSWORD FORM ===== -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-card__title">Forgot Password</h1>
      <p class="auth-card__subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email" required>
        </div>

        <div id="status-box" style="display:none; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:0.92rem; text-align:center;"></div>

        <button type="submit" class="auth-btn" id="submit-btn">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api/auth';
    const form = document.getElementById('forgot-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusBox = document.getElementById('status-box');

    function showStatus(msg, type) {
      statusBox.innerHTML = msg;
      statusBox.style.display = 'block';
      if (type === 'success') {
        statusBox.style.cssText += 'color:#2e7d32; background:#e8f5e9; border:1px solid #a5d6a7;';
      } else {
        statusBox.style.cssText += 'color:#e53e3e; background:#fff5f5; border:1px solid #feb2b2;';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusBox.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      if (!email) {
        showStatus('Please enter your email address.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      try {
        const res = await fetch(`${API_BASE}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();
        showStatus(data.message || 'If an account with that email exists, a password reset link has been sent.', 'success');
      } catch (err) {
        showStatus('Unable to connect to the server. Please try again later.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
