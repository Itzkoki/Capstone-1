<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Barcarse Psychological Services</title>
  <meta name="description" content="View your notifications at Barcarse Psychological Services.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="notifications.css">
  <link rel="stylesheet" href="intakeform.css">
  <link rel="stylesheet" href="toast.css">
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 24px;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: 20px;
      max-width: 650px;
      width: 100%;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #a0aec0;
    }

    .modal-close:hover {
      color: #e53e3e;
    }

    .modal-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .modal-btn--confirm {
      background: #34c759;
      color: #fff;
    }

    .modal-btn--confirm:hover {
      background: #2da44e;
    }

    .modal-btn--decline {
      background: #e53e3e;
      color: #fff;
    }

    .modal-btn--decline:hover {
      background: #c53030;
    }

    .modal-btn--reschedule {
      background: #805ad5;
      color: #fff;
    }

    .modal-btn--reschedule:hover {
      background: #6b46c1;
    }
  </style>
</head>

<body class="notif-page logged-in">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">

    <div class="navbar__right">

        <li><a href="community.html">Community</a></li>

  <!-- ===== MAIN CONTENT ===== -->

    <!-- Search -->

      <button class="filter-tab" data-filter="community">Community <span class="filter-tab__count"

    <!-- Notification list -->

  <!-- ===== APPOINTMENT DETAIL MODAL ===== -->
  <div class="modal-overlay" id="appt-modal">
    <div class="modal-content">

      <div id="appt-modal-body">
        <p>Loading...</p>

  <!-- ===== TELECONFERENCE DETAIL MODAL ===== -->
  <div class="modal-overlay" id="teleconf-modal">
    <div class="modal-content">
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:16px;"><svg viewBox="0 0 24 24"
          width="22" height="22" style="fill:#34c759;vertical-align:middle;margin-right:6px;">

        </svg>Teleconference Session</h2>
      <button class="modal-close" onclick="closeModal('teleconf-modal')">&times;</button>
      <div id="teleconf-modal-body">

    </div>

  <!-- ===== INTAKE FORM DETAIL MODAL ===== -->
  <div class="modal-overlay" id="intake-modal">
    <div class="modal-content" style="max-width:750px;">
      <button class="modal-close" onclick="closeModal('intake-modal')">&times;</button>
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:16px;"><svg viewBox="0 0 24 24"
          width="22" height="22" style="fill:#34c759;vertical-align:middle;margin-right:6px;">
          <path
            d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
        </svg>Intake Form Details</h2>

  <!-- ===== SCRIPTS ===== -->
  <script src="session.js"></script>
  <script src="toast.js"></script>
  <script src="bps-calendar.js"></script>
  <script>
    // ── API Configuration ─────────────────────────────────
    const API_BASE = 'http://localhost:5000/api/notifications';
    const ARTICLES_API = 'http://localhost:5000/api/articles';
    const token = BPSSession.getToken();
    const currentUser = BPSSession.getUser();
    const isStaff = currentUser.role && currentUser.role !== 'client';
    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    let notifications = [];
    let activeFilter = 'all';

    // ── Load notifications from API ───────────────────────
    async function loadNotifications() {
      const list = document.getElementById('notif-list');
      list.innerHTML = `
        <div class="notif-empty">
          <div class="notif-empty__text">Loading notifications…</div>
        </div>`;

      try {
        const res = await fetch(`${API_BASE}?limit=50`, {
          headers: authHeaders,
        });

        if (res.status === 401) {
          BPSSession.logout();
          return;
        }

        const json = await res.json();
        if (res.ok && json.success) {
          notifications = json.data.notifications.map(n => ({
            id: n.id,
            category: n.type,
            title: n.title,
            text: n.message,
            time: timeAgo(n.created_at),
            action: getActionLabel(n.type),
            link: n.link,
            unread: !n.is_read,
          }));
        } else {
          notifications = [];
        }
      } catch (err) {
        console.error('Failed to load notifications:', err);
        notifications = [];
      }

      updateCounts();
      renderNotifications();
    }

    // ── Relative time helper ──────────────────────────────
    function timeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffSec < 60) return 'Just now';
      if (diffMin < 60) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
      if (diffHr < 24) return `${diffHr} hour${diffHr > 1 ? 's' : ''} ago`;
      if (diffDay < 7) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
      return date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Action label per type ─────────────────────────────
    function getActionLabel(type) {
      switch (type) {
        case 'appointment': return 'View Appointment';
        case 'teleconference': return 'Join Meeting';
        case 'report': return 'View Report';
        case 'community': return 'View Article';
        case 'intake': return 'View Details';
        default: return 'View';
      }
    }

    // ── Render notification cards ─────────────────────────
    function renderNotifications() {
      const list = document.getElementById('notif-list');
      const search = document.getElementById('search-input').value.toLowerCase();

      let filtered = notifications;

      // Filter by category
      if (activeFilter !== 'all') {
        filtered = filtered.filter(n => n.category === activeFilter);
      }

      // Filter by search
      if (search) {
        filtered = filtered.filter(n =>
          n.title.toLowerCase().includes(search) ||
          n.text.toLowerCase().includes(search)
        );
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="notif-empty">
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <div class="notif-empty__title">No notifications</div>
            <div class="notif-empty__text">You're all caught up!</div>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(n => {
        // Determine action buttons based on role and notification type
        let actionButtons = '';

        // Staff gets Approve/Reject for pending community posts
        const isPendingReview = isStaff && n.category === 'community' && n.text.includes('review');
        const isIntakeAction = isStaff && n.category === 'intake' && n.text.includes('awaiting review');

        if (isPendingReview) {
          actionButtons = `
            <button class="notif-card__action" onclick="handleAction(${n.id})" style="background:#34c759;color:#fff;">Review Posts</button>
          `;
        } else if (isIntakeAction) {
          actionButtons = `
            <button class="notif-card__action" onclick="handleAction(${n.id})" style="background:#3182ce;color:#fff;">Review Form</button>
          `;
        } else if (n.link) {
          actionButtons = `<button class="notif-card__action" onclick="handleAction(${n.id})">${n.action}</button>`;
        }

        return `
          <div class="notif-card ${n.unread ? 'unread' : ''}" data-id="${n.id}" data-category="${n.category}">
            <div class="notif-card__top">
              <div class="notif-card__content">
                <div class="notif-card__title">${n.title}</div>
                <div class="notif-card__text">${n.text}</div>
                <div class="notif-card__time">${n.time}</div>
              </div>
              <div class="notif-card__actions">
                ${actionButtons}
                ${n.unread ? `<button class="notif-card__action notif-card__action--read" onclick="markRead(${n.id})" title="Mark as read"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:currentColor;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></button>` : ''}
                <button class="notif-card__action notif-card__action--delete" onclick="deleteNotif(${n.id})" title="Delete"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:currentColor;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Update category counts & badge ────────────────────
    function updateCounts() {
      const unreadCount = notifications.filter(n => n.unread).length;
      document.getElementById('count-all').textContent = notifications.length;
      document.getElementById('count-appointment').textContent = notifications.filter(n => n.category === 'appointment').length;
      document.getElementById('count-teleconference').textContent = notifications.filter(n => n.category === 'teleconference').length;
      document.getElementById('count-report').textContent = notifications.filter(n => n.category === 'report').length;
      document.getElementById('count-community').textContent = notifications.filter(n => n.category === 'community').length;
      document.getElementById('count-intake').textContent = notifications.filter(n => n.category === 'intake').length;

      // Update badge (inside bell SVG)
      const bellCount = document.getElementById('bell-count-svg');
      if (unreadCount > 0) {
        if (bellCount) bellCount.textContent = unreadCount > 9 ? '9+' : unreadCount;
      } else {
        if (bellCount) bellCount.textContent = '';
      }

      // Update subtitle
      document.getElementById('notif-status').textContent = unreadCount > 0
        ? `You have ${unreadCount} unread notification${unreadCount > 1 ? 's' : ''}`
        : 'All caught up!';
    }

    // ── Mark single notification as read (API) ────────────
    async function markRead(id) {
      try {
        await fetch(`${API_BASE}/${id}/read`, {
          method: 'PUT',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to mark notification as read:', err);
      }

      const n = notifications.find(n => n.id === id);
      if (n) n.unread = false;
      updateCounts();
      renderNotifications();
      BPSToast.info('Notification marked as read.', { title: 'Read', duration: 2000 });
    }

    // ── Mark all as read (API) ────────────────────────────
    async function markAllRead() {
      try {
        await fetch(`${API_BASE}/read-all`, {
          method: 'PUT',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to mark all as read:', err);
      }

      notifications.forEach(n => n.unread = false);
      updateCounts();
      renderNotifications();
      BPSToast.success('All notifications marked as read.', { title: 'All Read' });
    }

    // ── Delete notification (API) ─────────────────────────
    async function deleteNotif(id) {
      try {
        await fetch(`${API_BASE}/${id}`, {
          method: 'DELETE',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to delete notification:', err);
      }

      notifications = notifications.filter(n => n.id !== id);
      updateCounts();
      renderNotifications();
      BPSToast.info('Notification deleted.', { title: 'Deleted', duration: 2000 });
    }

    // ── Action handler — show detail modal or navigate ─────
    async function handleAction(id) {
      const n = notifications.find(n => n.id === id);
      if (!n) return;

      // Mark as read first
      if (n.unread) markRead(id);

      // For appointment notifications, show appointment detail modal
      if (n.category === 'appointment') {
        await showAppointmentModal();
        return;
      }

      // For teleconference notifications, show teleconference modal
      if (n.category === 'teleconference') {
        await showTeleconfModal();
        return;
      }

      // For intake notifications — staff goes to review page, client sees detail modal
      if (n.category === 'intake') {
        if (isStaff) {
          window.location.href = 'intake-submissions.html';
        } else {
          await showIntakeDetailModal();
        }
        return;
      }

      // Navigate to the link for other types
      if (n.link) {
        window.location.href = n.link;
      }
    }

    // ── Appointment Detail Modal ──────────────────────────
    async function showAppointmentModal() {
      document.getElementById('appt-modal').classList.add('active');
      const body = document.getElementById('appt-modal-body');
      body.innerHTML = '<p style="color:#718096;">Loading appointment details...</p>';

      try {
        const res = await fetch('http://localhost:5000/api/appointments', { headers: authHeaders });
        const json = await res.json();

        if (!json.success || !json.data.length) {
          body.innerHTML = '<p style="color:#a0aec0;">No appointments found.</p>';
          return;
        }

        body.innerHTML = json.data.map(a => {
          const statusColors = {
            pending_review: '#975a16', approved: '#16a34a', reschedule_proposed: '#805ad5',
            confirmed: '#16a34a', declined: '#991b1b', cancelled: '#6b7280',
          };
          const statusBg = {
            pending_review: '#fefcbf', approved: '#c6f6d5', reschedule_proposed: '#e9d8fd',
            confirmed: '#c6f6d5', declined: '#fed7d7', cancelled: '#f3f4f6',
          };

          // Determine if appointment can be edited/cancelled
          const canEdit = ['pending_review', 'approved', 'reschedule_proposed', 'confirmed'].includes(a.status);
          const canCancel = !['cancelled', 'declined'].includes(a.status);

          // Status-specific info (view-only for clients)
          let statusInfo = '';
          if (a.status === 'pending_review') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#fefcbf;border-radius:10px;border:1px solid #f6e05e;">
                <p style="font-size:13px;color:#975a16;font-weight:600;"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#975a16;vertical-align:middle;margin-right:4px;"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg> Your appointment is pending staff review. You will be notified once the schedule is approved or if a new time is proposed.</p>
                <div style="margin-top:12px;">
                  <button onclick="handleCancelAppointment(${a.id})" style="padding:10px 24px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#fff5f5';this.style.borderColor='#fc8181'" onmouseout="this.style.background='#fff';this.style.borderColor='#fed7d7'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#e53e3e;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg> Cancel Appointment</button>
                </div>
              </div>`;
          } else if (a.status === 'approved') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#f0fff4;border-radius:10px;border:1px solid #9ae6b4;">
                <p style="font-size:14px;color:#22543d;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#22543d;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Schedule Approved</p>

                  <button onclick="handleCancelAppointment(${a.id})" style="padding:10px 24px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#fff5f5';this.style.borderColor='#fc8181'" onmouseout="this.style.background='#fff';this.style.borderColor='#fed7d7'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#e53e3e;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg> Cancel Appointment</button>

          } else if (a.status === 'reschedule_proposed') {

                <p style="font-size:13px;color:#553c9a;font-weight:600;margin-bottom:4px;"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#553c9a;vertical-align:middle;margin-right:4px;"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg> Staff proposed a new schedule:</p>

                ${a.staff_notes ? `<p style="font-size:12px;color:#718096;margin-top:4px;">Note: ${a.staff_notes}</p>` : ''}

                  <button onclick="confirmAppointment(${a.id})" style="padding:10px 24px;background:#34c759;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#28a745'" onmouseout="this.style.background='#34c759'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;vertical-align:middle;margin-right:4px;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Accept Schedule</button>
                  <button onclick="toggleRescheduleInline(${a.id})" style="padding:10px 24px;background:#7c6cfc;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#6c5ce7'" onmouseout="this.style.background='#7c6cfc'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;vertical-align:middle;margin-right:4px;"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg> Propose Different Time</button>
                  <button onclick="declineAppointment(${a.id})" style="padding:10px 24px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#fff5f5'" onmouseout="this.style.background='#fff'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#e53e3e;vertical-align:middle;margin-right:4px;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> Decline</button>
                </div>
                <div id="reschedule-inline-${a.id}" style="display:none;margin-top:14px;padding:14px;background:#faf8ff;border-radius:10px;border:1px solid #e9d8fd;">
                  <label style="font-size:13px;font-weight:600;color:#553c9a;display:block;margin-bottom:6px;">Select your preferred date and time:</label>

                    <button onclick="document.getElementById('reschedule-inline-${a.id}').style.display='none'" style="padding:8px 20px;background:#fff;color:#718096;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;cursor:pointer;">Cancel</button>
                  </div>

              </div>`;
          } else if (a.status === 'confirmed') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#f0fff4;border-radius:10px;border:1px solid #9ae6b4;">
                <p style="font-size:14px;color:#22543d;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#22543d;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Appointment Confirmed</p>
                <p style="font-size:15px;color:#1a202c;font-weight:700;margin-top:4px;">${fmtDate(a.approved_datetime)}</p>
              </div>`;
          } else if (a.status === 'declined') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#fff5f5;border-radius:10px;border:1px solid #fed7d7;">
                <p style="font-size:14px;color:#742a2a;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#742a2a;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg> Appointment Declined</p>
              </div>`;
          } else if (a.status === 'cancelled') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#f7fafc;border-radius:10px;border:1px solid #e2e8f0;">
                <p style="font-size:14px;color:#6b7280;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#6b7280;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg> Appointment Cancelled</p>
              </div>`;
          }

          // Build View Details expandable content (always show, with edit/cancel conditional inside)
          let detailsContent = `
              <div id="appt-details-${a.id}" style="display:none;margin-top:14px;padding:16px;background:#f7fafc;border-radius:12px;border:1px solid #e2e8f0;animation:fadeIn 0.2s ease;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;margin-bottom:14px;">
                  <div><span style="color:#718096;font-weight:500;">Preferred:</span> <strong>${fmtDate(a.preferred_datetime)}</strong></div>
                  ${a.approved_datetime ? `<div><span style="color:#718096;font-weight:500;">Approved:</span> <strong style="color:#16a34a;">${fmtDate(a.approved_datetime)}</strong></div>` : ''}
                  ${a.proposed_datetime ? `<div><span style="color:#718096;font-weight:500;">Proposed:</span> <strong style="color:#805ad5;">${fmtDate(a.proposed_datetime)}</strong></div>` : ''}
                  ${a.modality ? `<div><span style="color:#718096;font-weight:500;">Modality:</span> <strong>${a.modality}</strong></div>` : ''}
                  ${a.staff_name ? `<div><span style="color:#718096;font-weight:500;">Staff:</span> <strong>${a.staff_name}</strong></div>` : ''}
                  ${a.staff_notes ? `<div style="grid-column:1/-1;"><span style="color:#718096;font-weight:500;">Staff Notes:</span> <strong>${a.staff_notes}</strong></div>` : ''}
                </div>
                ${(canEdit || canCancel) ? `<div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:12px;border-top:1px solid #edf2f7;">
                  ${canEdit ? `<button onclick="toggleEditInline(${a.id})" style="padding:10px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(102,126,234,0.3);" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(102,126,234,0.4)'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(102,126,234,0.3)'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;vertical-align:middle;margin-right:4px;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg> Edit Appointment</button>` : ''}
                  ${canCancel ? `<button onclick="handleCancelAppointment(${a.id})" style="padding:10px 24px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#fff5f5';this.style.borderColor='#fc8181'" onmouseout="this.style.background='#fff';this.style.borderColor='#fed7d7'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#e53e3e;vertical-align:middle;margin-right:4px;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg> Cancel Appointment</button>` : ''}
                </div>` : ''}
                ${canEdit ? `<div id="edit-inline-${a.id}" style="display:none;margin-top:14px;padding:16px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;">
                  <label style="font-size:13px;font-weight:700;color:#2d3748;display:block;margin-bottom:8px;"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#2d3748;vertical-align:middle;margin-right:4px;"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg> Select new date and time:</label>
                  <div id="edit-cal-container-${a.id}"></div>
                  <div id="edit-time-container-${a.id}" style="margin-top:10px;">
                    <label style="font-size:12px;font-weight:600;color:#718096;display:block;margin-bottom:4px;">Time:</label>
                    <select id="edit-time-${a.id}" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;">
                      <option value="">Select time</option>
                    </select>
                  </div>
                  <div id="edit-avail-${a.id}" style="display:none;margin-top:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;"></div>
                  <input type="hidden" id="edit-dt-${a.id}">
                  <div style="display:flex;gap:8px;margin-top:12px;">
                    <button onclick="submitEditAppointment(${a.id})" style="padding:10px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;">Save Changes</button>
                    <button onclick="document.getElementById('edit-inline-${a.id}').style.display='none'" style="padding:10px 24px;background:#fff;color:#718096;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;cursor:pointer;">Cancel</button>
                  </div>
                </div>` : ''}
              </div>`;

          return `
            <div style="padding:16px 0;border-bottom:1px solid #edf2f7;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <span style="font-weight:700;font-size:15px;">Appointment #${a.id}</span>
                <span style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:${statusBg[a.status] || '#f3f4f6'};color:${statusColors[a.status] || '#6b7280'};">${(a.status || '').replace(/_/g, ' ')}</span>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
                <div><span style="color:#718096;">Preferred:</span> <strong>${fmtDate(a.preferred_datetime)}</strong></div>
                ${a.modality ? `<div><span style="color:#718096;">Modality:</span> <strong>${a.modality}</strong></div>` : ''}
                ${a.staff_name ? `<div><span style="color:#718096;">Staff:</span> <strong>${a.staff_name}</strong></div>` : ''}
              </div>
              ${statusInfo}
              <div style="margin-top:12px;">
                <button onclick="toggleApptDetails(${a.id})" style="padding:8px 20px;background:#edf2f7;color:#2d3748;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#edf2f7'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#2d3748;vertical-align:middle;margin-right:4px;"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> View Details</button>

      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load appointment details.</p>';

    }

    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString('en-PH', { dateStyle: 'full', timeStyle: 'short' });
    }

    // ── Intake Form Detail Modal ──────────────────────────
    async function showIntakeDetailModal() {
      document.getElementById('intake-modal').classList.add('active');
      const body = document.getElementById('intake-modal-body');
      body.innerHTML = '<p style="color:#718096;">Loading your intake form...</p>';

      try {
        // Fetch intake forms AND appointments in parallel
        const [intakeRes, apptRes] = await Promise.all([
          fetch('http://localhost:5000/api/intake-forms', { headers: authHeaders }),
          fetch('http://localhost:5000/api/appointments', { headers: authHeaders }),
        ]);
        const json = await intakeRes.json();
        const apptJson = await apptRes.json();

        if (!json.success || !json.data || !json.data.length) {
          body.innerHTML = '<p style="color:#a0aec0;">No intake forms found.</p>';
          return;
        }

        // Show the latest form
        const f = json.data[0];
        const fd = typeof f.form_data === 'string' ? JSON.parse(f.form_data) : f.form_data;
        if (!fd) {
          body.innerHTML = '<p style="color:#a0aec0;">Form data is not available.</p>';
          return;
        }

        // Find linked appointment
        let linkedAppt = null;
        if (apptJson.success && apptJson.data && apptJson.data.length) {
          linkedAppt = apptJson.data.find(a => a.intake_form_id === f.id) || apptJson.data[0];
        }

        const statusBg = { pending: '#fefcbf', reviewed: '#bee3f8', approved: '#c6f6d5', rejected: '#fed7d7' };
        const statusColor = { pending: '#975a16', reviewed: '#2a4365', approved: '#22543d', rejected: '#742a2a' };

        const sections = [
          {
            title: 'Personal Information', fields: [
              { lbl: 'Full Name', val: fd.fullName },
              { lbl: 'Nickname', val: fd.nickName },
              { lbl: 'Age', val: fd.age },
              { lbl: 'Date of Birth', val: fd.dob },
              { lbl: 'Gender', val: fd.gender },
              { lbl: 'Civil Status', val: fd.civilStatus },
              { lbl: 'Address', val: fd.address, full: true },
            ]
          },
          {
            title: 'Contact', fields: [
              { lbl: 'Cellphone', val: fd.cellphone },
              { lbl: 'Home Phone', val: fd.homePhone },
              { lbl: 'Email', val: fd.email },
            ]
          },
          {
            title: 'Clinical', fields: [
              { lbl: 'Concern', val: fd.concernDesc, full: true },
              { lbl: 'Reason', val: fd.reasonCounseling, full: true },
              { lbl: 'Since When', val: fd.sinceWhen },
              { lbl: 'Duration', val: fd.howLong },
              { lbl: 'Therapy Before', val: fd.therapyBefore },
              { lbl: 'Medication', val: fd.medicationHistory },
            ]
          },
          {
            title: 'Preferences', fields: [
              { lbl: 'Preferred Schedule', val: fd.prefSchedule ? fmtDate(fd.prefSchedule) : '' },
              { lbl: 'Language', val: fd.language },
              { lbl: 'Modality', val: fd.modality },
              { lbl: 'Counselor Pref.', val: fd.counselorGender },
            ]
          },
          {
            title: 'Minor / Guardian', fields: [
              { lbl: 'Is Minor', val: fd.isMinor },
              { lbl: 'Guardian Name', val: fd.guardianName },
              { lbl: 'Guardian Contact', val: fd.guardianContact },
              { lbl: 'Relationship', val: fd.guardianRelation },
            ]
          },
          {
            title: 'Emergency Contact', fields: [
              { lbl: 'Name', val: fd.emerName },
              { lbl: 'Address', val: fd.emerAddress, full: true },
              { lbl: 'Contact', val: fd.emerContact },
              { lbl: 'Email', val: fd.emerEmail },
              { lbl: 'Relation', val: fd.emerRelation },
            ]
          },
        ];

        let html = `<div style="margin-bottom:16px;">
          <span style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:${statusBg[f.status] || '#f3f4f6'};color:${statusColor[f.status] || '#6b7280'};">${f.status}</span>
          <span style="color:#a0aec0;font-size:13px;margin-left:8px;">Submitted ${timeAgo(f.created_at)}</span>
        </div>`;

        // ── Appointment Status Section ──
        if (linkedAppt) {
          const apptStatusBg = { pending_review: '#fefcbf', approved: '#c6f6d5', reschedule_proposed: '#e9d8fd', confirmed: '#c6f6d5', declined: '#fed7d7', cancelled: '#f3f4f6' };
          const apptStatusColor = { pending_review: '#975a16', approved: '#16a34a', reschedule_proposed: '#805ad5', confirmed: '#16a34a', declined: '#991b1b', cancelled: '#6b7280' };
          const canCancel = !['cancelled', 'declined'].includes(linkedAppt.status);

          html += `<div style="margin-top:16px;padding:16px;background:rgba(52,199,89,0.04);border-radius:12px;border:1px solid rgba(52,199,89,0.15);">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
              <svg viewBox="0 0 24 24" width="18" height="18" style="fill:#34c759;"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
              <span style="font-weight:700;font-size:14px;color:#1a202c;">Appointment</span>
              <span style="padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;text-transform:uppercase;margin-left:auto;background:${apptStatusBg[linkedAppt.status] || '#f3f4f6'};color:${apptStatusColor[linkedAppt.status] || '#6b7280'};">${(linkedAppt.status || '').replace(/_/g, ' ')}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
              <div><span style="color:#718096;font-weight:500;">Preferred:</span> <strong>${fmtDate(linkedAppt.preferred_datetime)}</strong></div>
              ${linkedAppt.approved_datetime ? '<div><span style="color:#718096;font-weight:500;">Approved:</span> <strong style="color:#16a34a;">' + fmtDate(linkedAppt.approved_datetime) + '</strong></div>' : ''}
              ${linkedAppt.proposed_datetime ? '<div><span style="color:#718096;font-weight:500;">Proposed:</span> <strong style="color:#805ad5;">' + fmtDate(linkedAppt.proposed_datetime) + '</strong></div>' : ''}
              ${linkedAppt.modality ? '<div><span style="color:#718096;font-weight:500;">Modality:</span> <strong>' + linkedAppt.modality + '</strong></div>' : ''}
              ${linkedAppt.staff_notes ? '<div style="grid-column:1/-1;"><span style="color:#718096;font-weight:500;">Staff Notes:</span> <strong>' + linkedAppt.staff_notes + '</strong></div>' : ''}
            </div>`;

          if (canCancel) {
            html += `<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(52,199,89,0.12);">
              <button onclick="cancelIntakeAppointment(${linkedAppt.id})" style="padding:10px 24px;background:#fff;color:#e53e3e;border:1.5px solid #fed7d7;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#fff5f5';this.style.borderColor='#fc8181'" onmouseout="this.style.background='#fff';this.style.borderColor='#fed7d7'"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#e53e3e;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg> Cancel Appointment</button>
            </div>`;
          }

          html += '</div>';
        }

        sections.forEach(s => {
          const used = s.fields.filter(fld => fld.val);
          if (!used.length) return;
          html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid #edf2f7;">
            <div style="font-weight:700;font-size:14px;color:#1a202c;margin-bottom:8px;">${s.title}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">`;
          used.forEach(fld => {
            html += `<div style="${fld.full ? 'grid-column:1/-1;' : ''}">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#a0aec0;letter-spacing:0.5px;">${fld.lbl}</div>
              <div style="font-size:14px;color:#2d3748;line-height:1.5;">${fld.val}</div>
            </div>`;
          });
          html += '</div></div>';
        });

        body.innerHTML = html;
      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load intake form details.</p>';
      }
    }

    // ── Cancel Appointment from Intake Modal ──────────────
    async function cancelIntakeAppointment(apptId) {
      if (!confirm('Are you sure you want to cancel this appointment? The time slot will become available for other clients.')) return;
      try {
        const res = await fetch('http://localhost:5000/api/appointments/' + apptId + '/cancel', {
          method: 'PUT',
          headers: authHeaders,
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Appointment cancelled successfully. The time slot is now available for others.', { title: 'Cancelled' });
          closeModal('intake-modal');
          loadNotifications();
        } else {
          BPSToast.error(json.message || 'Failed to cancel appointment.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    // ── Teleconference Detail Modal ──────────────────────────
    async function showTeleconfModal() {
      document.getElementById('teleconf-modal').classList.add('active');
      const body = document.getElementById('teleconf-modal-body');
      body.innerHTML = '<p style="color:#718096;">Loading session details...</p>';

      try {
        const res = await fetch('http://localhost:5000/api/teleconference', { headers: authHeaders });
        const json = await res.json();

        if (!json.success || !json.data.length) {
          body.innerHTML = '<p style="color:#a0aec0;">No sessions found.</p>';
          return;
        }

        body.innerHTML = json.data.map(s => {
          const stColors = { scheduled: '#975a16', active: '#16a34a', ended: '#6b7280', cancelled: '#991b1b' };
          const stBg = { scheduled: '#fefcbf', active: '#c6f6d5', ended: '#f3f4f6', cancelled: '#fed7d7' };
          const canJoin = s.session_status === 'scheduled' || s.session_status === 'active';
          return `
            <div style="padding:16px 0;border-bottom:1px solid #edf2f7;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="font-weight:700;font-size:15px;">${s.meeting_title || 'Session'}</span>
                <span style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:${stBg[s.session_status] || '#f3f4f6'};color:${stColors[s.session_status] || '#6b7280'};">${s.session_status}</span>
              </div>
              <div style="font-size:13px;color:#718096;margin-bottom:8px;">
                <span>Host: <strong>${s.psychologist_name || '—'}</strong></span>
                ${s.created_at ? ` · Created ${timeAgo(s.created_at)}` : ''}
              </div>
              ${canJoin ? `<a href="meetings.html" style="display:inline-block;padding:8px 20px;background:#34c759;color:#fff;border-radius:8px;font-weight:600;font-size:13px;text-decoration:none;">Join Session →</a>` : ''}
            </div>`;
        }).join('');
      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load session details.</p>';
      }
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', function (e) { if (e.target === this) this.classList.remove('active'); });
    });

    // ── Inline appointment actions (Confirm / Decline / Reschedule) ──
    async function confirmAppointment(apptId) {
      try {
        const res = await fetch(`http://localhost:5000/api/appointments/${apptId}/confirm`, {
          method: 'PUT',
          headers: authHeaders,
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Appointment confirmed! You will receive further details soon.', { title: 'Confirmed' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to confirm appointment.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    async function declineAppointment(apptId) {
      if (!confirm('Are you sure you want to decline this appointment?')) return;
      try {
        const res = await fetch(`http://localhost:5000/api/appointments/${apptId}/decline`, {
          method: 'PUT',
          headers: authHeaders,
          body: JSON.stringify({ notes: 'Declined by client from notifications' }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.info('Appointment declined. Staff has been notified.', { title: 'Declined' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to decline.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    let notifCalendars = {};

    function toggleRescheduleInline(apptId) {
      const panel = document.getElementById(`reschedule-inline-${apptId}`);
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'block' : 'none';

      if (isHidden && !notifCalendars[apptId]) {
        notifCalendars[apptId] = BPSCalendar.mount(`#notif-cal-container-${apptId}`, {
          showTime: true,
          onChange: (isoVal) => {
            document.getElementById(`new-dt-${apptId}`).value = isoVal;
          },
        });
      }
    }

    async function submitNewSchedule(apptId) {
      const input = document.getElementById(`new-dt-${apptId}`);
      if (!input || !input.value) {
        BPSToast.warning('Please select a date and time.', { title: 'Missing Date' });
        return;
      }
      if (new Date(input.value) <= new Date()) {
        BPSToast.warning('Please select a future date and time.', { title: 'Invalid Date' });
        return;
      }
      try {
        const res = await fetch(`http://localhost:5000/api/appointments/${apptId}/request-change`, {
          method: 'PUT',
          headers: authHeaders,
          body: JSON.stringify({ new_datetime: input.value, notes: 'Client proposed new time from notifications' }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('New schedule submitted! Staff will review your request.', { title: 'Schedule Requested' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to submit new schedule.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    // ── Toggle View Details panel ──────────────────────────
    function toggleApptDetails(apptId) {
      const panel = document.getElementById(`appt-details-${apptId}`);
      if (panel) {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    }

    // ── Edit Appointment Inline ──────────────────────────
    let editCalendars = {};

    const EDIT_TIME_SLOTS = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const EDIT_TIME_LABELS = {
      '09:00': '9:00 AM', '10:00': '10:00 AM', '11:00': '11:00 AM', '12:00': '12:00 PM',
      '13:00': '1:00 PM', '14:00': '2:00 PM', '15:00': '3:00 PM', '16:00': '4:00 PM', '17:00': '5:00 PM'
    };

    function toggleEditInline(apptId) {
      const panel = document.getElementById(`edit-inline-${apptId}`);
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'block' : 'none';

      if (isHidden && !editCalendars[apptId]) {
        editCalendars[apptId] = BPSCalendar.mount(`#edit-cal-container-${apptId}`, {
          showTime: false,
          onChange: async (isoVal) => {
            // isoVal from BPSCalendar may contain time - extract date part
            const dateStr = isoVal.split('T')[0];
            // Fetch availability for selected date
            try {
              const res = await fetch(`http://localhost:5000/api/appointments/availability?date=${dateStr}`, {
                headers: authHeaders,
              });
              const json = await res.json();
              if (json.success) {
                const avail = json.data;
                const timeSelect = document.getElementById(`edit-time-${apptId}`);
                let html = '<option value="">Select time</option>';
                EDIT_TIME_SLOTS.forEach(slot => {
                  const isBooked = avail.bookedSlots && avail.bookedSlots.includes(slot);
                  if (isBooked) {
                    html += `<option value="${slot}" disabled>${EDIT_TIME_LABELS[slot]} — Booked</option>`;
                  } else {
                    html += `<option value="${slot}">${EDIT_TIME_LABELS[slot]}</option>`;
                  }
                });
                timeSelect.innerHTML = html;

                // Show availability
                const availEl = document.getElementById(`edit-avail-${apptId}`);
                if (avail.isFull) {
                  availEl.innerHTML = '<span style="color:#e53e3e;">●</span> <span style="color:#e53e3e;">Fully booked — choose another date</span>';
                  availEl.style.display = 'flex';
                  timeSelect.disabled = true;
                } else {
                  const color = avail.remaining <= 1 ? '#e53e3e' : avail.remaining <= 3 ? '#d69e2e' : '#38a169';
                  availEl.innerHTML = `<span style="color:${color};">●</span> <span style="color:${color};">${avail.remaining} of ${avail.maxPerDay} slots available</span>`;
                  availEl.style.display = 'flex';
                  timeSelect.disabled = false;
                }

                // Update hidden input when time changes
                timeSelect.onchange = () => {
                  if (timeSelect.value) {
                    document.getElementById(`edit-dt-${apptId}`).value = `${dateStr}T${timeSelect.value}`;
                  } else {
                    document.getElementById(`edit-dt-${apptId}`).value = '';
                  }
                };
              }
            } catch (err) {
              console.error('Failed to fetch availability for edit:', err);
            }
          },
        });
      }
    }

    // ── Cancel Appointment ──────────────────────────
    async function handleCancelAppointment(apptId) {
      if (!confirm('Are you sure you want to cancel this appointment? The time slot will become available for other clients.')) return;
      try {
        const res = await fetch(`http://localhost:5000/api/appointments/${apptId}/cancel`, {
          method: 'PUT',
          headers: authHeaders,
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Appointment cancelled. The time slot is now available for others.', { title: 'Cancelled' });
          await showAppointmentModal();
          loadNotifications();
        } else {
          BPSToast.error(json.message || 'Failed to cancel appointment.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    // ── Submit Edited Appointment ──────────────────────────
    async function submitEditAppointment(apptId) {
      const input = document.getElementById(`edit-dt-${apptId}`);
      if (!input || !input.value) {
        BPSToast.warning('Please select a date and time.', { title: 'Missing Date & Time' });
        return;
      }
      if (new Date(input.value) <= new Date()) {
        BPSToast.warning('Please select a future date and time.', { title: 'Invalid Date' });
        return;
      }
      try {
        const res = await fetch(`http://localhost:5000/api/appointments/${apptId}/edit`, {
          method: 'PUT',
          headers: authHeaders,
          body: JSON.stringify({ new_datetime: input.value }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Appointment updated! Staff will review the new schedule.', { title: 'Updated' });
          editCalendars = {}; // Reset cached calendars
          await showAppointmentModal();
          loadNotifications();
        } else {
          BPSToast.error(json.message || 'Failed to update appointment.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    // ── Filter tabs ───────────────────────────────────────
    document.getElementById('notif-filters').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      renderNotifications();
    });

    // ── Search ────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', renderNotifications);

    // ── Mark all as read button ───────────────────────────
    document.getElementById('mark-all-read').addEventListener('click', markAllRead);

    // ── Init ──────────────────────────────────────────────
    loadNotifications();

    // ── Polling: check for new notifications every 30s ────
    let lastUnreadCount = -1;
    setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/unread-count`, { headers: authHeaders });
        if (!res.ok) return;
        const json = await res.json();
        const newCount = json.data?.count ?? 0;
        if (lastUnreadCount >= 0 && newCount !== lastUnreadCount) {
          // Count changed — reload full list
          loadNotifications();
        }
        lastUnreadCount = newCount;
      } catch (_) { /* silent */ }
    }, 30000);
  </script>
</body>

</html>
