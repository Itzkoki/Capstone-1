<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Barcarse Psychological Services</title>
  <meta name="description" content="Staff dashboard for Barcarse Psychological Services.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="admin-dashboard.css">
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="navbar.css">
</head>
<body class="dashboard-page logged-in">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="landingpage.html" class="navbar__brand">
      <div class="navbar__logo">
        <img src="barcarse logo.jpg" alt="BPS Logo">
      </div>
      <h3 class="navbar__title">Barcarse Psychological Services</h3>
    </a>
    <div class="navbar__right">
      <ul class="navbar__links" id="nav-links"></ul>
      <a href="notifications.html" class="navbar__notif" id="notif-bell" title="Notifications">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="#1B2230"/></svg>
      </a>
      <a href="profile.html" class="navbar__profile" title="Profile">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </a>
    </div>
  </nav>

  <!-- ===== DASHBOARD CONTENT ===== -->
  <div class="dashboard-container" id="dashboard-content">
    <div class="dashboard-loading" id="loading">
      <div class="spinner"></div>
      <p>Loading your dashboard...</p>
    </div>
  </div>

  <script src="session.js"></script>
  <script src="role-guard.js"></script>
  <script>
    const API_BASE = 'http://localhost:5000/api';
    const token = BPSSession.getToken();
    const user  = BPSSession.getUser();

    // Block client users from accessing the admin dashboard
    if (user.role === 'client') {
      window.location.replace('landingpage.html');
    }

    // Navbar (incl. role-based Dashboard items + clinic-admin Website Management)
    // is rendered by the shared navbar.js.

    const ROLE_LABELS = {
      client: 'Client',
      psychometrician: 'Psychometrician',
      supervising_psychometrician: 'Supervising Psychometrician',
      qc_psychometrician: 'QC Psychometrician',
      psychologist: 'Psychologist',
      clinical_director: 'Clinical Director',
    };

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    // Audit-log timestamp: full date plus a 24-hour time, e.g. "Jun 7, 2026 14:30".
    function auditTimestamp(dateStr) {
      if (!dateStr) return 'N/A';
      const dt = new Date(dateStr);
      const date = dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      const time = dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
      return `${date} ${time}`;
    }

    async function loadDashboard() {
      try {
        const res = await fetch(`${API_BASE}/dashboard`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401) { window.location.href = 'login.html'; return; }
          throw new Error(data.message);
        }

        renderDashboard(data.data);
      } catch (err) {
        document.getElementById('dashboard-content').innerHTML =
          `<div class="dashboard-loading"><p style="color:#e53e3e;">Failed to load dashboard: ${err.message}</p></div>`;
      }
    }

    function renderDashboard(d) {
      const container = document.getElementById('dashboard-content');
      const roleName = ROLE_LABELS[d.role] || d.role;

      let html = `
        <div class="dashboard-header">
          <h1 class="dashboard-header__greeting">Welcome back, ${user.full_name || 'Staff'}</h1>
          <span class="dashboard-header__role">${roleName}</span>
          <p class="dashboard-header__summary">${d.summary || ''}</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__icon"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></div>
            <div class="stat-card__value">${d.unreadNotifications}</div>
            <div class="stat-card__label">Unread Notifications</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
            <div class="stat-card__value">${d.articleCount}</div>
            <div class="stat-card__label">Articles</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></div>
            <div class="stat-card__value">${d.activeMeetings}</div>
            <div class="stat-card__label">Active Meetings</div>
          </div>
          ${d.totalStaff !== undefined ? `
          <div class="stat-card">
            <div class="stat-card__icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
            <div class="stat-card__value">${d.totalStaff}</div>
            <div class="stat-card__label">Total Staff</div>
          </div>` : ''}
        </div>
      `;

      // Quick Actions
      if (d.quickActions && d.quickActions.length) {
        html += `<div class="quick-actions">
          <div class="quick-actions__title">Quick Actions</div>
          <div class="quick-actions__grid">
            ${d.quickActions.map(a => `
              <a href="${a.link}" class="quick-action-card">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                <span>${a.label}</span>
              </a>
            `).join('')}
          </div>
        </div>`;
      }

      // Notifications
      html += `<div class="notifications-panel">
        <div class="notifications-panel__header">
          <span class="notifications-panel__title">Recent Notifications</span>
          ${d.unreadNotifications > 0 ? `<span class="notifications-panel__badge">${d.unreadNotifications} new</span>` : ''}
        </div>
        ${d.recentNotifications.length > 0 ? d.recentNotifications.map(n => `
          <div class="notif-item">
            <div class="notif-dot ${n.is_read ? 'notif-dot--read' : ''}"></div>
            <div>
              <div class="notif-content__title">${n.title}</div>
              <div class="notif-content__message">${n.message || ''}</div>
              <div class="notif-content__time">${timeAgo(n.created_at)}</div>
            </div>
          </div>
        `).join('') : '<div class="notif-empty">No notifications yet.</div>'}
      </div>`;

      // Clinical Director extras
      if (d.role === 'clinical_director') {
        // Staff by role
        if (d.staffByRole) {
          html += `<div class="notifications-panel" style="margin-bottom:32px">
            <div class="notifications-panel__title">Staff by Role</div>
            <table class="role-table">
              <thead><tr><th>Role</th><th>Count</th></tr></thead>
              <tbody>
                ${d.staffByRole.map(r => `<tr><td>${ROLE_LABELS[r.role] || r.role}</td><td>${r.count}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>`;
        }

        // Recent activity
        if (d.recentActivity && d.recentActivity.length) {
          html += `<div class="activity-feed">
            <div class="activity-feed__title">Recent System Activity</div>
            ${d.recentActivity.map(a => `
              <div class="activity-item">
                <span class="activity-item__user">${a.full_name || 'System'}</span>
                <span class="activity-item__action">${a.action}</span>
                <span class="activity-item__time">${auditTimestamp(a.created_at)}</span>
              </div>
            `).join('')}
          </div>`;
        }
      }

      container.innerHTML = html;
    }

    loadDashboard();
  </script>
  <script src="navbar.js"></script>
</body>
</html>
