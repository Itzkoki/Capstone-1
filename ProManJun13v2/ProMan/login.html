<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Barcarse Psychological Services</title>
  <meta name="description" content="Login to your Barcarse Psychological Services account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="auth-split.css">
  <link rel="stylesheet" href="design-system.css">
  <link rel="preload" as="image" href="auth-images/carousel-1.png">
</head>

<body class="auth-page">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="landingpage.html" class="navbar__brand">
      <div class="navbar__logo">
        <img src="barcarse logo.jpg" alt="BPS Logo">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
        </svg>
      </div>
      <span class="navbar__title">Barcarse Psychological Services</span>
    </a>
  </nav>

  <!-- ===== LOGIN (split: media LEFT / form RIGHT) ===== -->
  <div class="auth-wrapper">
    <div class="auth-split auth-split--media-left">

      <!-- ---- media / carousel panel ---- -->
      <aside class="auth-split__media" id="auth-media" aria-label="Barcarse Psychological Services">
        <div class="auth-media__inner">
          <a></a>
          <div class="auth-media__caption">
            <span class="auth-media__eyebrow">Welcome back</span>
            <h2 class="auth-media__headline" id="media-headline">A clear mind starts with the right support</h2>
            <p class="auth-media__sub" id="media-sub">Sign in to manage your appointments, reports, and your mental
              health journey.</p>
            <div class="auth-media__dots" id="media-dots" role="tablist" aria-label="Slideshow controls"></div>
          </div>
        </div>
      </aside>

      <!-- ---- form panel ---- -->
      <div class="auth-split__form">
        <div class="auth-form-inner">
          <h1 class="auth-card__title">Login Your Account</h1>
          <p class="auth-card__subtitle">Start managing your environments efficiently today</p>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Enter your password"
                  autocomplete="current-password" required>
                <button type="button" class="password-toggle" id="toggle-password"
                  aria-label="Toggle password visibility">
                  <svg viewBox="0 0 24 24" id="eye-icon">
                    <path
                      d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="auth-inline-link">
              <a href="forgot-password.html">Forgot Password?</a>
            </div>
            <button type="submit" class="auth-btn" id="login-btn">Login</button>
          </form>

          <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== CAROUSEL ===== -->
  <script src="auth-carousel.js"></script>
  <script>
    initAuthCarousel({
      mediaEl: document.getElementById('auth-media'),
      dotsEl: document.getElementById('media-dots'),
      headlineEl: document.getElementById('media-headline'),
      subEl: document.getElementById('media-sub'),
      interval: 5000,
      images: [
        'auth-images/carousel-1.png',
        'auth-images/carousel-2.png',
        'auth-images/carousel-3.png',
      ],
      captions: [
        {
          headline: 'A clear mind starts with the right support',
          sub: 'Sign in to manage your appointments, reports, and your mental health journey.',
        },
        {
          headline: 'Open the door to better understanding',
          sub: 'Your records and consultations, all in one secure place.',
        },
        {
          headline: 'Find your way through, together',
          sub: 'Professional psychological services, guided every step of the way.',
        },
      ],
    });
  </script>

  <!-- ===== LOGIN LOGIC (unchanged) ===== -->
  <script>
    // ── If already logged in, redirect away (back-button protection) ──
    (function () {
      const token = sessionStorage.getItem('bps_token');
      const loggedIn = sessionStorage.getItem('bps_logged_in');
      if (token && loggedIn === 'true') {
        const user = JSON.parse(sessionStorage.getItem('bps_user') || '{}');
        const dest = (user.role && user.role !== 'client') ? 'admin-dashboard.html' : 'landingpage.html';
        window.location.replace(dest);
        return;
      }
    })();

    // Password toggle
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>'
        : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    });

    // Login — call backend API and handle response
    const API_BASE = 'http://localhost:5000/api/auth';
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');

    // Create error/info display element
    const statusBox = document.createElement('div');
    statusBox.id = 'login-status';
    statusBox.style.cssText = 'display:none; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:0.92rem; text-align:center;';
    loginForm.insertBefore(statusBox, loginBtn);

    // ── Lockout banner element ──
    const lockoutBanner = document.createElement('div');
    lockoutBanner.id = 'lockout-banner';
    lockoutBanner.style.cssText = 'display:none;';
    loginForm.parentNode.insertBefore(lockoutBanner, loginForm);

    let lockoutCountdownInterval = null;

    function showStatus(msg, type) {
      statusBox.innerHTML = msg;
      statusBox.style.display = 'block';
      if (type === 'error') {
        statusBox.style.cssText += 'color:#e53e3e; background:#fff5f5; border:1px solid #feb2b2;';
      } else if (type === 'warning') {
        statusBox.style.cssText += 'color:#dd6b20; background:#fffaf0; border:1px solid #fbd38d;';
      } else {
        statusBox.style.cssText += 'color:#dd6b20; background:#fffaf0; border:1px solid #fbd38d;';
      }
    }

    function hideStatus() {
      statusBox.style.display = 'none';
    }

    function showLockoutBanner(lockedUntilISO) {
      const lockedUntil = new Date(lockedUntilISO);
      loginForm.style.display = 'none';
      hideStatus();

      if (lockoutCountdownInterval) clearInterval(lockoutCountdownInterval);

      // Render the banner ONCE — only update the timer text each second
      lockoutBanner.innerHTML = `
        <style>
          @keyframes lockFadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
          @keyframes lockPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
        </style>
        <div style="
          background: linear-gradient(135deg, #fff5f5, #fed7d7);
          border: 1.5px solid #feb2b2;
          border-radius: 16px;
          padding: 32px 28px;
          text-align: center;
          animation: lockFadeIn 0.5s ease-out;
        ">
          <div style="
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #e53e3e, #c53030);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(229, 62, 62, 0.3);
          ">
            <svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:#fff;">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
          <h2 style="
            font-family: 'Inter', sans-serif;
            font-weight: 700; font-size: 20px;
            color: #c53030; margin: 0 0 8px;
          ">Account Temporarily Locked</h2>
          <p style="
            font-size: 14px; color: #742a2a;
            line-height: 1.6; margin: 0 0 24px;
            max-width: 360px; margin-left: auto; margin-right: auto;
          ">
            Your account has been temporarily locked due to multiple failed login attempts.
            This is to protect your account security.
          </p>
          <div style="
            background: rgba(197, 48, 48, 0.08);
            border-radius: 12px; padding: 16px; margin-bottom: 20px;
          ">
            <div style="font-size:12px;font-weight:600;color:#9b2c2c;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;">
              Time Remaining
            </div>
            <div id="lockout-timer" style="
              font-family: 'Inter', monospace;
              font-size: 36px; font-weight: 800;
              color: #c53030; letter-spacing: 2px;
              transition: color 0.3s ease;
            ">--:--</div>
          </div>
          <p style="font-size:12px;color:#a0aec0;margin:0;line-height:1.5;">
            Access will be automatically restored when the timer expires.<br>
            If you believe this is an error, please contact support.
          </p>
        </div>
      `;

      lockoutBanner.style.display = 'block';

      const timerEl = document.getElementById('lockout-timer');

      function tick() {
        const remaining = lockedUntil.getTime() - Date.now();
        if (remaining <= 0) {
          clearInterval(lockoutCountdownInterval);
          lockoutCountdownInterval = null;
          lockoutBanner.style.display = 'none';
          lockoutBanner.innerHTML = '';
          loginForm.style.display = '';
          return;
        }
        const m = Math.floor(remaining / 60000);
        const s = Math.floor((remaining % 60000) / 1000);
        timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
        // Pulse effect in last 30 seconds
        if (remaining < 30000) {
          timerEl.style.animation = 'lockPulse 1s ease-in-out infinite';
          timerEl.style.color = '#e53e3e';
        }
      }

      tick();
      lockoutCountdownInterval = setInterval(tick, 1000);
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();

      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showStatus('Please fill in all fields.', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Store JWT token and user info in sessionStorage (cleared on browser close)
          sessionStorage.setItem('bps_logged_in', 'true');
          sessionStorage.setItem('bps_token', data.data.token);
          sessionStorage.setItem('bps_user', JSON.stringify(data.data.user));
          // Clear any cross-tab logout signal from previous session
          localStorage.removeItem('bps_logout');
          // Redirect based on role: clients go to landing page, staff go to dashboard
          const role = data.data.user.role;
          if (role === 'client') {
            window.location.replace('landingpage.html');
          } else {
            window.location.replace('admin-dashboard.html');
          }
        } else if (res.status === 423 && data.locked) {
          // ── Account locked — show lockout banner with countdown ──
          showLockoutBanner(data.locked_until);
        } else if (res.status === 403) {
          // Unverified email — store email for the OTP page and offer link
          sessionStorage.setItem('bps_user', JSON.stringify({ email }));
          showStatus('Your email is not verified. <a href="verify-otp.html" style="color:#15306E;font-weight:600;">Verify now</a>', 'warning');
        } else {
          showStatus(data.message || 'Invalid email or password.', 'error');
        }
      } catch (err) {
        showStatus('Unable to connect to the server. Please try again later.', 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>

</html>
