  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 24px;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: 20px;
      max-width: 650px;
      width: 100%;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #a0aec0;
    }

    .modal-close:hover {
      color: #e53e3e;
    }

    .modal-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .modal-btn--confirm {
      background: #1E3A8A;
      color: #fff;
    }

    .modal-btn--confirm:hover {
      background: #2da44e;
    }

    .modal-btn--decline {
      background: #e53e3e;
      color: #fff;
    }

    .modal-btn--decline:hover {
      background: #c53030;
    }

    .modal-btn--reschedule {
      background: #8A6A18;
      color: #fff;
    }

    .modal-btn--reschedule:hover {
      background: #6b46c1;
    }

    /* ── Bulk select ── */
    .btn-select-notif {
      padding: 8px 20px;
      border: 1.5px solid #1E3A8A;
      background: #fff;
      color: #1E3A8A;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .btn-select-notif.active {
      background: #1E3A8A;
      color: #fff;
    }
    .notif-bulk-bar {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .notif-bulk-bar.visible { display: flex; }
    .notif-bulk-bar__count { font-size: 14px; font-weight: 600; color: #2d3748; }
    .btn-delete-sel-notif {
      padding: 7px 20px;
      border: 1.5px solid #e53e3e;
      background: transparent;
      color: #e53e3e;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .btn-delete-sel-notif:hover { background: #fff5f5; }
    .notif-card__cb-wrap {
      display: flex;
      align-items: flex-start;
      padding-top: 3px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .notif-card__cb {
      width: 17px;
      height: 17px;
      cursor: pointer;
      accent-color: #1E3A8A;
    }
  </style>

  <script>
    // ── API Configuration ─────────────────────────────────
    const API_BASE = '/api/notifications';
    const ARTICLES_API = '/api/articles';
    const token = BPSSession.getToken();
    const currentUser = BPSSession.getUser();
    const isStaff = currentUser.role && currentUser.role !== 'client';
    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    let notifications = [];
    let activeFilter = 'all';
    let paymentsByAppt = {};
    let selectedNotifs = new Set();
    let notifSelectionMode = false;

    /* ══════════════════════════════════════════════════════════
       NOTIFICATION CATEGORIES — colors + icons (client & staff)
       ══════════════════════════════════════════════════════════ */
    const NOTIF_ICONS = {
      appointment:    '<path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>',
      teleconference: '<path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>',
      community:      '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>',
      intake:         '<path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>',
      ticket:         '<path d="M22 10V6c0-1.11-.9-2-2-2H4c-1.1 0-1.99.89-1.99 2v4c1.1 0 1.99.9 1.99 2s-.89 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2zm-2-1.46c-1.19.69-2 1.99-2 3.46s.81 2.77 2 3.46V18H4v-2.54c1.19-.69 2-1.99 2-3.46 0-1.48-.8-2.77-1.99-3.46L4 6h16v2.54z"/>',
      report:         '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>',
      general:        '<path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>'
    };
    const NOTIF_CATEGORIES = {
      appointment:    { label: 'Appointments',   color: '#0B6E3B', ink: '#0B6E3B', activeInk: '#ffffff', icon: 'appointment' },
      teleconference: { label: 'Teleconference', color: '#1E3A8A', ink: '#1E3A8A', activeInk: '#ffffff', icon: 'teleconference' },
      community:      { label: 'Community',       color: '#91D06C', ink: '#2E7D32', activeInk: '#0A3D1B', icon: 'community' },
      intake:         { label: 'Intake',          color: '#C0922E', ink: '#9A7320', activeInk: '#ffffff', icon: 'intake' },
      ticket:         { label: 'Tickets',         color: '#E76F2E', ink: '#B5521A', activeInk: '#ffffff', icon: 'ticket' },
      report:         { label: 'Reports',         color: '#BF4646', ink: '#A53A3A', activeInk: '#ffffff', icon: 'report' },   // staff only
      general:        { label: 'General',         color: '#64748B', ink: '#64748B', activeInk: '#ffffff', icon: 'general' }
    };
    // Map a raw backend notification type onto a canonical category key.
    function categoryOf(type) {
      switch (type) {
        case 'appointment':
        case 'payment':          return 'appointment';
        case 'teleconference':   return 'teleconference';
        case 'community':        return 'community';
        case 'intake':           return 'intake';
        case 'request':
        case 'ticket':           return 'ticket';
        case 'report':
        case 'report_ready':
        case 'case_assigned':
        case 'review_needed':
        case 'validation_ready': return 'report';
        default:                 return 'general';
      }
    }
    function catMeta(cat) { return NOTIF_CATEGORIES[cat] || NOTIF_CATEGORIES.general; }
    function catIconSvg(cat, size) {
      const d = NOTIF_ICONS[catMeta(cat).icon] || NOTIF_ICONS.general;
      size = size || 16;
      return '<svg class="notif-cat-ic" viewBox="0 0 24 24" width="' + size + '" height="' + size + '" aria-hidden="true">' + d + '</svg>';
    }
    // Ordered category keys for the filter tabs (role-aware).
    // Clients do NOT get the Reports category; staff keep it.
    function filterCategories() {
      const order = ['appointment', 'teleconference', 'community', 'intake', 'ticket'];
      if (isStaff) order.splice(2, 0, 'report');
      return order;
    }
    // Build the filter-tab bar (All + each category) with icons + colors.
    function buildFilterTabs() {
      const bar = document.getElementById('notif-filters');
      if (!bar) return;
      let html = '<button class="filter-tab active" data-filter="all">' +
        '<svg class="notif-cat-ic" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M4 10h16v2H4zm0-4h16v2H4zm0 8h10v2H4z"/></svg>' +
        ' All <span class="filter-tab__count" id="count-all">0</span></button>';
      filterCategories().forEach(function (cat) {
        const m = catMeta(cat);
        html += '<button class="filter-tab" data-filter="' + cat + '" style="--cat:' + m.color + ';--cat-ink:' + m.ink + ';--cat-actink:' + m.activeInk + '">' +
          catIconSvg(cat, 15) + ' ' + m.label +
          ' <span class="filter-tab__count" id="count-' + cat + '">0</span></button>';
      });
      bar.innerHTML = html;
    }
    const PAY_API = '/api/payments';

    // Static clinic payment display values (no secrets — these mirror the QR).
    const PAY_QR = { full: 'qr-full-payment.jpg', half: 'qr-half-payment.jpg' };
    const PAY_ACCT = { name: 'JO*N YE*J B.', mobile: '0905 664 ••••' };

    // ── Load notifications from API ───────────────────────
    async function loadNotifications() {
      const list = document.getElementById('notif-list');
      list.innerHTML = `
        <div class="notif-empty">
          <div class="notif-empty__text">Loading notifications…</div>
        </div>`;

      try {
        const res = await fetch(`${API_BASE}?limit=500`, {
          headers: authHeaders,
        });

        if (res.status === 401) {
          BPSSession.logout();
          return;
        }

        const json = await res.json();
        if (res.ok && json.success) {
          notifications = json.data.notifications.map(n => {
            // Appointment notifications carry the related appointment id in the
            // link (e.g. "notifications.html?appt=123") so the detail modal can
            // show only that appointment instead of the whole history.
            let apptId = null;
            const m = (n.link || '').match(/[?&]appt=(\d+)/);
            if (m) apptId = parseInt(m[1], 10);
            return {
              id: n.id,
              type: n.type,
              category: categoryOf(n.type),
              title: n.title,
              text: n.message,
              time: timeAgo(n.created_at),
              action: getActionLabel(n.type, { link: n.link, title: n.title }),
              link: n.link,
              apptId,
              unread: !n.is_read,
            };
          });
        } else {
          notifications = [];
        }
      } catch (err) {
        console.error('Failed to load notifications:', err);
        notifications = [];
      }

      updateCounts();
      renderNotifications();
    }

    // ── Relative time helper ──────────────────────────────
    function timeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffSec < 60) return 'Just now';
      if (diffMin < 60) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
      if (diffHr < 24) return `${diffHr} hour${diffHr > 1 ? 's' : ''} ago`;
      if (diffDay < 7) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
      return date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Action label per type ─────────────────────────────
    function getActionLabel(type, n) {
      switch (type) {
        case 'appointment': return 'View Appointment';
        case 'teleconference': return 'Join Meeting';
        case 'report': return 'View Report';
        case 'community': return 'View Article';
        case 'intake': return 'View Details';
        case 'payment': {
          const title = (n && n.title) || '';
          // Supervising Psychometrician verifies a submitted payment.
          if (title.includes('Awaiting Verification')) return 'Verify Payment';
          // Client confirmation that their slot is reserved — read-only details.
          if (title.includes('Slot Confirmed') || title.includes('Payment Verified')) return 'View Details';
          return 'Complete Payment';
        }
        case 'request':
        case 'ticket':
          // Rejection notifications get "Submit Again" which re-opens the form.
          // Approval notifications get "Click Payment".
          if (n && n.link && n.link.includes('resubmit=1')) return 'Submit Again';
          if (n && n.link && n.link.includes('request-payment.html')) return 'Click Payment';
          // Report-request payment awaiting verification → opens the Payment
          // Verification module (Supervising Psychometrician).
          if (n && n.link && n.link.includes('payments-admin.html')) return 'Verify Payment';
          // CD: modified report submitted for final review → opens the concern
          // review (original concern + modified report + uploaded PDF + actions).
          if (n && n.title === 'Requested Concern Modified') return 'View Details';
          // Report-concern notifications open the report (with the concern overlay)
          // in the report module — not a "ticket". Label them "View Report".
          if (n && n.link && n.link.includes('concern=')) return 'View Report';
          return 'View Ticket';
        default: return 'View';
      }
    }

    // ── Render notification cards ─────────────────────────
    // Expand/collapse a notification's message so the full content is shown on
    // click instead of the 2-line clamped preview.
    function toggleNotifText(e, el) {
      e.stopPropagation();
      el.classList.toggle('expanded');
    }

    function renderNotifications() {
      const list = document.getElementById('notif-list');
      const search = document.getElementById('search-input').value.toLowerCase();

      let filtered = notifications;

      // Filter by category
      if (activeFilter !== 'all') {
        filtered = filtered.filter(n => n.category === activeFilter);
      }

      // Filter by search
      if (search) {
        filtered = filtered.filter(n =>
          n.title.toLowerCase().includes(search) ||
          n.text.toLowerCase().includes(search)
        );
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="notif-empty">
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <div class="notif-empty__title">No notifications</div>
            <div class="notif-empty__text">You're all caught up!</div>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(n => {
        // Determine action buttons based on role and notification type
        let actionButtons = '';

        // Staff gets Approve/Reject for pending community posts
        const isPendingReview = isStaff && n.category === 'community' && n.text.includes('review');
        const isIntakeAction = isStaff && n.category === 'intake' && n.text.includes('awaiting review');
        // Client "Proof of Payment Received" is purely informational — no action.
        const isProofReceived = n.category === 'payment' && n.title && n.title.includes('Proof of Payment Received');

        if (isProofReceived) {
          actionButtons = '';
        } else if (isPendingReview) {
          actionButtons = `
            <button class="notif-card__action" onclick="handleAction(${n.id})" style="background:#1E3A8A;color:#fff;">Review Posts</button>
          `;
        } else if (isIntakeAction) {
          actionButtons = `
            <button class="notif-card__action" onclick="handleAction(${n.id})" style="background:#15306E;color:#fff;">Review Form</button>
          `;
        } else if (n.link && !(n.title && n.title.includes('Awaiting Schedule Confirmation'))) {
          actionButtons = `<button class="notif-card__action" onclick="handleAction(${n.id})">${n.action}</button>`;
        }

        const meta = catMeta(n.category);
        return `
          <div class="notif-card ${n.unread ? 'unread' : ''}" data-id="${n.id}" data-category="${n.category}" style="--cat:${meta.color};--cat-ink:${meta.ink}">
            <div class="notif-card__top">
              ${notifSelectionMode ? `<label class="notif-card__cb-wrap"><input type="checkbox" class="notif-card__cb" onchange="toggleNotifSelect(${n.id},this.checked)" ${selectedNotifs.has(n.id)?'checked':''}></label>` : ''}
              <div class="notif-card__content">
                <div class="notif-card__cat">
                  <span class="notif-cat-badge">${catIconSvg(n.category, 14)}<span class="notif-cat-badge__label">${meta.label}</span></span>
                  ${n.unread ? '<span class="notif-unread-dot" title="Unread"></span>' : ''}
                </div>
                <div class="notif-card__title">${n.title}</div>
                <div class="notif-card__text" onclick="toggleNotifText(event, this)" title="Click to view the full message">${n.text}</div>
                <div class="notif-card__time">${n.time}</div>
              </div>
              ${!notifSelectionMode ? `<div class="notif-card__actions">
                ${actionButtons}
                ${n.unread
                  ? `<button class="notif-card__action notif-card__action--toggle" onclick="markRead(${n.id})" title="Mark as read">Mark as read</button>`
                  : `<button class="notif-card__action notif-card__action--toggle" onclick="markUnread(${n.id})" title="Mark as unread">Mark as unread</button>`}
                <button class="notif-card__action notif-card__action--delete" onclick="deleteNotif(${n.id})" title="Delete"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:currentColor;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
              </div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Update category counts & badge ────────────────────
    function updateCounts() {
      const unreadCount = notifications.filter(n => n.unread).length;
      const setCount = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      setCount('count-all', notifications.length);
      // Count per canonical category (only for the tabs that exist for this role).
      filterCategories().forEach(cat => {
        setCount('count-' + cat, notifications.filter(n => n.category === cat).length);
      });

      // Update in-page bell badge (inside bell SVG)
      const bellCount = document.getElementById('bell-count-svg');
      if (bellCount) bellCount.textContent = unreadCount > 0 ? (unreadCount > 9 ? '9+' : unreadCount) : '';

      // Keep the shared navbar badge in sync immediately (no refresh needed).
      if (window.BPSNotifBadge && typeof window.BPSNotifBadge.set === 'function') {
        window.BPSNotifBadge.set(unreadCount);
      }

      // Update subtitle
      document.getElementById('notif-status').textContent = unreadCount > 0
        ? `You have ${unreadCount} unread notification${unreadCount > 1 ? 's' : ''}`
        : 'All caught up!';
    }

    // ── Mark single notification as read (API) ────────────
    async function markRead(id) {
      try {
        await fetch(`${API_BASE}/${id}/read`, {
          method: 'PUT',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to mark notification as read:', err);
      }

      const n = notifications.find(n => n.id === id);
      if (n) n.unread = false;
      updateCounts();
      renderNotifications();
      BPSToast.info('Notification marked as read.', { title: 'Read', duration: 2000 });
    }

    // ── Mark single notification as UNREAD (API) ──────────
    async function markUnread(id) {
      try {
        await fetch(`${API_BASE}/${id}/unread`, {
          method: 'PUT',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to mark notification as unread:', err);
      }

      const n = notifications.find(n => n.id === id);
      if (n) n.unread = true;
      updateCounts();
      renderNotifications();
      BPSToast.info('Notification marked as unread.', { title: 'Unread', duration: 2000 });
    }

    // ── Mark all as read (API) ────────────────────────────
    async function markAllRead() {
      try {
        await fetch(`${API_BASE}/read-all`, {
          method: 'PUT',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to mark all as read:', err);
      }

      notifications.forEach(n => n.unread = false);
      updateCounts();
      renderNotifications();
      BPSToast.success('All notifications marked as read.', { title: 'All Read' });
    }

    // ── Delete notification (API) ─────────────────────────
    async function deleteNotif(id) {
      try {
        await fetch(`${API_BASE}/${id}`, {
          method: 'DELETE',
          headers: authHeaders,
        });
      } catch (err) {
        console.error('Failed to delete notification:', err);
      }

      notifications = notifications.filter(n => n.id !== id);
      updateCounts();
      renderNotifications();
      BPSToast.info('Notification deleted.', { title: 'Deleted', duration: 2000 });
    }

    // Fetch a released report's signed PDF (with auth) and open it in a new tab.
    const REPORTS_API = '/api/reports';
    async function openClientReportPdf(reportId) {
      // Open the tab synchronously (still within the click gesture) so it isn't
      // blocked, then stream the PDF blob into it once fetched.
      const tab = window.open('', '_blank');
      try {
        const res = await fetch(`${REPORTS_API}/${reportId}/client-pdf`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) {
          let msg = 'Report unavailable.';
          try { const j = await res.json(); msg = j.message || msg; } catch (_) {}
          if (tab) tab.close();
          BPSToast.error(msg, { title: 'Could not open report' });
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        if (tab) { tab.location.href = url; } else { window.location.href = url; }
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      } catch (e) {
        if (tab) tab.close();
        BPSToast.error('Could not open your report.', { title: 'Error' });
      }
    }

    // ── Action handler — show detail modal or navigate ─────
    async function handleAction(id) {
      const n = notifications.find(n => n.id === id);
      if (!n) return;

      // Mark as read first
      if (n.unread) markRead(id);

      // Released psychological report: open the signed PDF directly. This must
      // run inside the click gesture so the browser allows the new tab, and the
      // PDF endpoint needs the auth header (a plain link navigation can't send it).
      if (n.link && n.link.indexOf('client-report:') === 0) {
        const reportId = n.link.split(':')[1];
        await openClientReportPdf(reportId);
        return;
      }

      // For appointment notifications, show appointment detail modal scoped
      // to just the appointment this notification is about — UNLESS the link
      // points to case management (e.g. "Appointment Confirmation Needed" for
      // the Supervising Psychometrician), in which case redirect there so the
      // specific client case opens.
      if (n.category === 'appointment') {
        if (n.link && n.link.indexOf('case-dashboard.html') === 0) {
          window.location.href = n.link;
          return;
        }
        await showAppointmentModal(n.apptId);
        return;
      }

      // For teleconference notifications, show the Join Meeting pop-up
      if (n.category === 'teleconference') {
        await showJoinMeetingModal(n);
        return;
      }

      // For intake notifications — show detail modal when appt_id is in the link;
      // for staff "awaiting review" intake notifications, always go to case dashboard.
      if (n.category === 'intake') {
        let hasApptId = false;
        if (n && n.link) {
          try { hasApptId = !!new URL('http://x/' + n.link).searchParams.get('appt_id'); } catch (_) {}
        }
        if (hasApptId) {
          await showIntakeDetailModal(n);
        } else if (isStaff && n.text && n.text.includes('awaiting review')) {
          window.location.href = 'case-dashboard.html';
        } else if (n.link) {
          window.location.href = n.link;
        }
        return;
      }

      // Navigate to the link for other types
      if (n.link) {
        window.location.href = n.link;
      }
    }

    // ── Appointment Detail Modal ──────────────────────────
    // Tracks which appointment the modal is currently showing so that
    // post-action refreshes (confirm, pay, edit, etc.) re-render the same
    // appointment instead of falling back to the full list.
    let currentApptId = null;

    // From the full appointment list, pick the single "current" appointment to
    // show when no specific appointment id is known. Active (non-terminal)
    // appointments take priority; the list is already newest-first.
    function pickCurrentAppointment(list) {
      if (!list || !list.length) return [];
      const active = list.filter(a => !['declined', 'cancelled'].includes(a.status));
      return [(active.length ? active : list)[0]];
    }

    async function showAppointmentModal(apptId = currentApptId) {
      notifCalendars = {}; // reset so BPSCalendar remounts on freshly rebuilt DOM
      currentApptId = (apptId === undefined || apptId === null) ? null : apptId;
      document.getElementById('appt-modal').classList.add('active');
      const body = document.getElementById('appt-modal-body');
      body.innerHTML = '<p style="color:#718096;">Loading appointment details...</p>';

      try {
        const [res, payRes] = await Promise.all([
          fetch('/api/appointments', { headers: authHeaders }),
          fetch('/api/payments', { headers: authHeaders }),
        ]);
        const json = await res.json();

        // Index the latest payment per appointment (API returns newest first)
        paymentsByAppt = {};
        try {
          const pj = await payRes.json();
          if (pj.success && Array.isArray(pj.data)) {
            pj.data.forEach(p => {
              if (p.appointment_id && !paymentsByAppt[p.appointment_id]) {
                paymentsByAppt[p.appointment_id] = p;
              }
            });
          }
        } catch (_) { /* payments are optional */ }

        if (!json.success || !json.data.length) {
          body.innerHTML = '<p style="color:#a0aec0;">No appointments found.</p>';
          return;
        }

        // Show only the appointment this notification refers to.
        let list = json.data;
        if (currentApptId != null) {
          const match = list.filter(a => String(a.id) === String(currentApptId));
          if (!match.length) {
            body.innerHTML = '<p style="color:#a0aec0;">This appointment is no longer available. It may have been removed or the link has expired.</p>';
            return;
          }
          list = match;
        } else {
          list = pickCurrentAppointment(list);
        }
        // Keep currentApptId in sync with what is actually shown.
        if (list.length) currentApptId = list[0].id;

        if (!list.length) {
          body.innerHTML = '<p style="color:#a0aec0;">No appointments found.</p>';
          return;
        }

        // Record each appointment's current/proposed schedule so the reschedule
        // picker can exclude those exact slots from the selectable options.
        apptScheduleInfo = {};
        list.forEach(a => {
          apptScheduleInfo[a.id] = {
            proposed: a.proposed_datetime || null,
            preferred: a.preferred_datetime || null,
            approved: a.approved_datetime || null,
          };
        });

        body.innerHTML = list.map(a => {
          const statusColors = {
            pending_review: '#975a16', approved: '#0B6E3B', reschedule_proposed: '#8A6A18',
            confirmed: '#0B6E3B', declined: '#991b1b', cancelled: '#6b7280',

            pending_review: '#fefcbf', approved: '#F0FAEC', reschedule_proposed: '#FBF5E7',

          // Editing is allowed during schedule negotiation, AND after the client
          // confirms the booking as long as they have NOT paid yet (req: they can
          // still change the schedule before proceeding to payment). A verified
          // payment locks the schedule.
          const payRec = paymentsByAppt[a.id];
          const isPaid = a.payment_status === 'paid_verified' || (payRec && payRec.status === 'verified');
          const canEdit = ['pending_review', 'approved'].includes(a.status)
            || (a.status === 'confirmed' && !isPaid);
          const canCancel = false;

          // Status-specific info (view-only for clients)
          let statusInfo = '';
          if (a.status === 'pending_review') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#fefcbf;border-radius:10px;border:1px solid #f6e05e;">
                <p style="font-size:13px;color:#975a16;font-weight:600;"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#975a16;vertical-align:middle;margin-right:4px;"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg> Your appointment is pending staff review. You will be notified once the schedule is approved or if a new time is proposed.</p>
              </div>`;

                ${a.staff_notes ? `<p style="font-size:12px;color:#718096;margin-top:4px;">Note: ${a.staff_notes}</p>` : ''}
                <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;" id="reschedule-actions-${a.id}">

                  <label style="font-size:13px;font-weight:600;color:#553c9a;display:block;margin-bottom:6px;">Select your preferred date and time:</label>

                <p style="font-size:15px;color:#1a202c;font-weight:700;margin-top:4px;">${fmtDate(a.approved_datetime || a.proposed_datetime || a.preferred_datetime)}</p>
              </div>
              ${currentUser.role === 'supervising_psychometrician' ? '' : buildPaymentSection(a, paymentsByAppt[a.id])}`;
          } else if (a.status === 'declined') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#fff5f5;border-radius:10px;border:1px solid #fed7d7;">
                <p style="font-size:14px;color:#742a2a;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#742a2a;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg> Appointment Declined</p>
              </div>`;
          } else if (a.status === 'cancelled') {
            statusInfo = `
              <div style="margin-top:10px;padding:12px 16px;background:#f7fafc;border-radius:10px;border:1px solid #e2e8f0;">
                <p style="font-size:14px;color:#6b7280;font-weight:700;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#6b7280;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg> Appointment Cancelled</p>
              </div>`;
          }

          return `
            <div style="padding:16px 0;border-bottom:1px solid #edf2f7;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <span style="font-weight:700;font-size:15px;">Appointment #${a.id}</span>
                <span style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:${statusBg[a.status] || '#f3f4f6'};color:${statusColors[a.status] || '#6b7280'};">${(a.status || '').replace(/_/g, ' ')}</span>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
                <div><span style="color:#718096;">Preferred:</span> <strong>${fmtDate(a.preferred_datetime)}</strong></div>
                ${a.modality ? `<div><span style="color:#718096;">Modality:</span> <strong>${a.modality}</strong></div>` : ''}
                ${a.approved_datetime ? `<div><span style="color:#718096;">Approved:</span> <strong style="color:#0B6E3B;">${fmtDate(a.approved_datetime)}</strong></div>` : ''}
                ${a.proposed_datetime && a.status !== 'reschedule_proposed' ? `<div><span style="color:#718096;">Proposed:</span> <strong style="color:#8A6A18;">${fmtDate(a.proposed_datetime)}</strong></div>` : ''}
                ${a.staff_name ? `<div><span style="color:#718096;">Staff:</span> <strong>${a.staff_name}</strong></div>` : ''}
                ${a.staff_notes ? `<div style="grid-column:1/-1;"><span style="color:#718096;">Staff Notes:</span> <strong>${a.staff_notes}</strong></div>` : ''}
              </div>
              ${statusInfo}
            </div>`;
        }).join('');
      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load appointment details.</p>';
      }
    }

    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString('en-PH', { dateStyle: 'full', timeStyle: 'short' });
    }

    // ── Intake Form Detail Modal ──────────────────────────
    async function showIntakeDetailModal(n) {
      document.getElementById('intake-modal').classList.add('active');
      const body = document.getElementById('intake-modal-body');
      body.innerHTML = '<p style="color:#718096;">Loading your form...</p>';

      try {
        // Extract appointment ID from notification link (e.g. "profile.html?appt_id=42")
        let apptId = null;
        if (n && n.link) {
          try { apptId = new URL('http://x/' + n.link).searchParams.get('appt_id'); } catch (_) {}
        }

        const notifTitle = (n && n.title) ? n.title.toLowerCase() : '';
        const isAssessment = notifTitle.includes('assessment');

        // Set modal title immediately so it's never stale from a previous session
        document.getElementById('intake-modal-title').textContent = isAssessment ? 'Assessment Form Details' : 'Counseling Form Details';

        let fd, isAssessmentForm, linkedAppt = null, formCreatedAt;

        if (apptId) {
          // New path: fetch exact form data for this specific appointment
          const previewRes = await fetch(`/api/appointments/${apptId}/intake-preview`, { headers: authHeaders });
          const previewJson = await previewRes.json();
          if (!previewJson.success) {
            body.innerHTML = '<p style="color:#a0aec0;">Form data is not available.</p>';
            return;
          }
          fd = typeof previewJson.form_data === 'string' ? JSON.parse(previewJson.form_data) : previewJson.form_data;
          isAssessmentForm = previewJson.form_type === 'assessment';
          formCreatedAt = previewJson.created_at;

          // Fetch the appointment itself for the linked appointment section
          const apptRes = await fetch(`/api/appointments/${apptId}`, { headers: authHeaders });
          const apptJson = await apptRes.json();
          if (apptJson.success) linkedAppt = apptJson.data;
        } else {
          // Fallback for old notifications that have no appt_id in the link
          const apiUrl = isAssessment
            ? '/api/assessment-intake-forms'
            : '/api/intake-forms';
          const [formRes, apptRes] = await Promise.all([
            fetch(apiUrl, { headers: authHeaders }),
            fetch('/api/appointments', { headers: authHeaders }),
          ]);
          const formJson = await formRes.json();
          const apptJson = await apptRes.json();
          if (!formJson.success || !formJson.data || !formJson.data.length) {
            body.innerHTML = '<p style="color:#a0aec0;">No form found.</p>';
            return;
          }
          const f = formJson.data[0];
          fd = typeof f.form_data === 'string' ? JSON.parse(f.form_data) : f.form_data;
          isAssessmentForm = isAssessment;
          formCreatedAt = f.created_at;
          if (apptJson.success && apptJson.data && apptJson.data.length) {
            linkedAppt = isAssessment
              ? apptJson.data.find(a => a.assessment_form_id === f.id)
              : apptJson.data.find(a => a.intake_form_id === f.id);
          }
        }

        if (!fd) {
          body.innerHTML = '<p style="color:#a0aec0;">Form data is not available.</p>';
          return;
        }

        const statusBg = { pending: '#fefcbf', reviewed: '#EEF1FA', approved: '#F0FAEC', rejected: '#fed7d7' };
        const statusColor = { pending: '#975a16', reviewed: '#2a4365', approved: '#0A5C31', rejected: '#742a2a' };
        const statusLabel = isAssessmentForm ? 'Assessment' : 'Counseling';
        document.getElementById('intake-modal-title').textContent = isAssessmentForm ? 'Assessment Form Details' : 'Counseling Form Details';

        let sections;
        if (isAssessmentForm) {
          const fullName = [fd.givenName, fd.middleName, fd.familyName].filter(Boolean).join(' ');
          sections = [
            {
              title: 'Client Information', fields: [
                { lbl: 'Full Name', val: fullName },
                { lbl: 'Nickname', val: fd.nickname },
                { lbl: 'Age', val: fd.age },
                { lbl: 'Birthdate', val: fd.birthdate },
                { lbl: 'Sex', val: fd.sex },
                { lbl: 'Contact Number', val: fd.contactNumber },
                { lbl: 'Email', val: fd.email },
                { lbl: 'Home Address', val: fd.homeAddress, full: true },
              ]
            },
            {
              title: 'Background', fields: [
                { lbl: 'Reason for Referral', val: fd.reasonForReferral },
                { lbl: 'Primary Language', val: fd.primaryLanguage },
                { lbl: 'Answering For', val: fd.answeringFor },
              ]
            },
            {
              title: 'Assessment History', fields: [
                { lbl: 'Assessed Before', val: fd.assessedBefore },
                { lbl: 'Details', val: fd.assessedBeforeDetails, full: true },
              ]
            },
            {
              title: 'Diagnoses & Interventions', fields: [
                { lbl: 'Existing Diagnoses', val: fd.existingDiagnoses },
                { lbl: 'Diagnosis Details', val: fd.existingDiagnosesDetails, full: true },
                { lbl: 'Current Interventions', val: fd.interventions },
                { lbl: 'Other Intervention', val: fd.interventionOther },
              ]
            },
            {
              title: 'Preferences', fields: [
                { lbl: 'Preferred Schedule', val: fd.prefSchedule ? fmtDate(fd.prefSchedule) : '' },
                { lbl: 'Modality', val: fd.modality },
              ]
            },
          ];
        } else {
          sections = [
          {
            title: 'Personal Information', fields: [
              { lbl: 'Family Name (Apelyido)', val: fd.familyName || fd.fullName },
              { lbl: 'Given Name (Pangalan)', val: fd.givenName },
              { lbl: 'Middle Name (Gitnang Pangalan)', val: fd.middleName },
              { lbl: 'Nickname', val: fd.nickName },
              { lbl: 'Age', val: fd.age },
              { lbl: 'Date of Birth', val: fd.dob },
              { lbl: 'Gender', val: fd.gender },
              { lbl: 'Civil Status', val: fd.civilStatus },
              { lbl: 'Address', val: fd.address, full: true },
            ]
          },
          {
            title: 'Contact', fields: [
              { lbl: 'Cellphone', val: fd.cellphone },
              { lbl: 'Home Phone', val: fd.homePhone },
              { lbl: 'Email', val: fd.email },
            ]
          },
          {
            title: 'Clinical', fields: [
              { lbl: 'Concern', val: fd.concernDesc, full: true },
              { lbl: 'Reason', val: fd.reasonCounseling, full: true },
              { lbl: 'Since When', val: fd.sinceWhen },
              { lbl: 'Duration', val: fd.howLong },
              { lbl: 'Therapy Before', val: fd.therapyBefore },
              { lbl: 'Medication', val: fd.medicationHistory },
            ]
          },
          {
            title: 'Preferences', fields: [
              { lbl: 'Preferred Schedule', val: fd.prefSchedule ? fmtDate(fd.prefSchedule) : '' },
              { lbl: 'Language', val: fd.language },
              { lbl: 'Modality', val: fd.modality },
              { lbl: 'Counselor Pref.', val: fd.counselorGender },
            ]
          },
          {
            title: 'Minor / Guardian', fields: [
              { lbl: 'Is Minor', val: fd.isMinor },
              { lbl: 'Guardian Name', val: fd.guardianName },
              { lbl: 'Guardian Contact', val: fd.guardianContact },
              { lbl: 'Relationship', val: fd.guardianRelation },
            ]
          },
          {
            title: 'Emergency Contact', fields: [
              { lbl: 'Name', val: fd.emerName },
              { lbl: 'Address', val: fd.emerAddress, full: true },
              { lbl: 'Contact', val: fd.emerContact },
              { lbl: 'Email', val: fd.emerEmail },
              { lbl: 'Relation', val: fd.emerRelation },
            ]
          },
        ];
        }

        let html = `<div style="margin-bottom:16px;">
          <span style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:${isAssessmentForm ? '#EEF1FA' : '#F0FAEC'};color:${isAssessmentForm ? '#2a4365' : '#0A5C31'};">${statusLabel}</span>
          <span style="color:#a0aec0;font-size:13px;margin-left:8px;">Submitted ${timeAgo(formCreatedAt)}</span>
        </div>`;

        // ── Appointment Status Section ──
        if (linkedAppt) {
          const apptStatusBg = { pending_review: '#fefcbf', approved: '#F0FAEC', reschedule_proposed: '#FBF5E7', confirmed: '#F0FAEC', declined: '#fed7d7', cancelled: '#f3f4f6' };
          const apptStatusColor = { pending_review: '#975a16', approved: '#0B6E3B', reschedule_proposed: '#8A6A18', confirmed: '#0B6E3B', declined: '#991b1b', cancelled: '#6b7280' };

          html += `<div style="margin-top:16px;padding:16px;background:rgba(30,58,138,0.04);border-radius:12px;border:1px solid rgba(30,58,138,0.15);">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
              <svg viewBox="0 0 24 24" width="18" height="18" style="fill:#1E3A8A;"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
              <span style="font-weight:700;font-size:14px;color:#1a202c;">Appointment</span>
              <span style="padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;text-transform:uppercase;margin-left:auto;background:${apptStatusBg[linkedAppt.status] || '#f3f4f6'};color:${apptStatusColor[linkedAppt.status] || '#6b7280'};">${(linkedAppt.status || '').replace(/_/g, ' ')}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
              <div><span style="color:#718096;font-weight:500;">Preferred:</span> <strong>${fmtDate(linkedAppt.preferred_datetime)}</strong></div>
              ${linkedAppt.approved_datetime ? '<div><span style="color:#718096;font-weight:500;">Approved:</span> <strong style="color:#0B6E3B;">' + fmtDate(linkedAppt.approved_datetime) + '</strong></div>' : ''}
              ${linkedAppt.proposed_datetime ? '<div><span style="color:#718096;font-weight:500;">Proposed:</span> <strong style="color:#8A6A18;">' + fmtDate(linkedAppt.proposed_datetime) + '</strong></div>' : ''}
              ${linkedAppt.modality ? '<div><span style="color:#718096;font-weight:500;">Modality:</span> <strong>' + linkedAppt.modality + '</strong></div>' : ''}
              ${linkedAppt.staff_notes ? '<div style="grid-column:1/-1;"><span style="color:#718096;font-weight:500;">Staff Notes:</span> <strong>' + linkedAppt.staff_notes + '</strong></div>' : ''}
            </div>
            <p style="margin-top:12px;font-size:12px;color:#718096;">Manage this appointment from the <strong>Appointments</strong> notifications to confirm your schedule and complete payment.</p>`;

          html += '</div>';

        sections.forEach(s => {
          const used = s.fields.filter(fld => fld.val);
          if (!used.length) return;
          html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid #edf2f7;">
            <div style="font-weight:700;font-size:14px;color:#1a202c;margin-bottom:8px;">${s.title}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">`;
          used.forEach(fld => {
            html += `<div style="${fld.full ? 'grid-column:1/-1;' : ''}">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#a0aec0;letter-spacing:0.5px;">${fld.lbl}</div>
              <div style="font-size:14px;color:#2d3748;line-height:1.5;">${fld.val}</div>
            </div>`;
          });
          html += '</div></div>';
        });

        body.innerHTML = html;
      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load intake form details.</p>';
      }
    }

    // ── Payment (Phase 2 — after schedule confirmed) ──────
    // Renders inside the "confirmed" appointment block based on the
    // current payment record for that appointment.
    function buildPaymentSection(a, pay) {
      // Verified — show confirmation + receipt link
      if (pay && pay.status === 'verified') {
        const bal = (pay.payment_option === 'half' && Number(pay.outstanding_balance) > 0)
          ? `<p style="font-size:12.5px;color:#8A6A18;margin-top:6px;">Remaining <strong>₱${Number(pay.outstanding_balance).toFixed(2)}</strong> payable in person on the day of your appointment.</p>` : '';
        return `<div style="margin-top:10px;padding:14px 16px;background:#f0fff4;border-radius:10px;border:1px solid #c6f6d5;">
            <p style="font-size:14px;color:#0A5C31;font-weight:700;">✓ Payment Verified — Slot Reserved</p>
            <p style="font-size:13px;color:#2d3748;margin-top:4px;">Reference <strong>${pay.reference_number}</strong> · ₱${Number(pay.amount_due).toFixed(2)} (${pay.payment_option === 'full' ? 'Full' : 'Half'} payment)</p>
            ${bal}
            <a href="receipt.html?payment=${pay.id}" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:9px 18px;background:#0B6E3B;color:#fff;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#fff;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 9h10v2H7V9zm6 4H7v-2h6v2zm4-6H7V5h10v2z"/></svg> View Receipt</a>
          </div>`;
      }
      // Under review
      if (pay && pay.status === 'under_review') {
        return `<div style="margin-top:10px;padding:14px 16px;background:#ebf2ff;border-radius:10px;border:1px solid #c3dafe;">
            <p style="font-size:14px;color:#1E3A8A;font-weight:700;">Payment Under Review</p>
            <p style="font-size:13px;color:#2d3748;margin-top:4px;">Your proof of payment (ref <strong>${pay.reference_number}</strong>) is awaiting verification. You'll be notified once it's confirmed.</p>
          </div>`;
      }
      // Pending (resume) — still within the 24h window. Send the client to the
      // dedicated payment page to continue (scan QR / upload proof).
      if (pay && pay.status === 'pending' && new Date(pay.expires_at) > new Date()) {
        const intakeR = a.intake_form_id != null ? a.intake_form_id : '';
        return `<div style="margin-top:10px;padding:16px;background:#fff;border-radius:12px;border:1px solid #e6eaf1;">
            <p style="font-size:14px;color:#1a202c;font-weight:700;">Payment in progress</p>
            <p style="font-size:12.5px;color:#8A6A18;margin-top:4px;">Reference <strong>${pay.reference_number}</strong> · submit your proof before <strong>${fmtDate(pay.expires_at)}</strong>.</p>
            <a href="payment.html?appt=${a.id}${intakeR !== '' ? '&intake=' + intakeR : ''}" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:11px 22px;background:linear-gradient(135deg,#1E3A8A,#15306E);color:#fff;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;">Continue Payment</a>
          </div>`;
      }
      // None / expired / rejected — show the no-refund / no-cancellation
      // reminder + agreement checkbox, then the Proceed to Payment button which
      // opens the dedicated payment page.
      let prior = '';
      if (pay && pay.status === 'rejected') prior = `<p style="font-size:12.5px;color:#c53030;margin-top:4px;">Your previous payment was not accepted${pay.rejection_reason ? ': ' + pay.rejection_reason : ''}. Please submit a new payment.</p>`;
      else if (pay && pay.status === 'expired') prior = `<p style="font-size:12.5px;color:#8A6A18;margin-top:4px;">Your previous payment window expired. Please submit a new payment.</p>`;
      const intake = a.intake_form_id != null ? a.intake_form_id : '';
      const proceedUrl = `payment.html?appt=${a.id}${intake !== '' ? '&intake=' + intake : ''}`;
      return `<div style="margin-top:10px;padding:16px;background:rgba(30,58,138,0.04);border-radius:12px;border:1px solid rgba(30,58,138,0.15);">
          <p style="font-size:14px;color:#1a202c;font-weight:700;">Reserve your slot — complete payment</p>
          ${prior}
          <div style="margin-top:12px;padding:14px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;">
            <p style="font-size:13px;color:#92400e;font-weight:700;display:flex;align-items:center;gap:6px;"><svg viewBox="0 0 24 24" width="16" height="16" style="fill:#92400e;"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg> Please read before paying</p>
            <p style="font-size:12.5px;color:#78350f;margin-top:6px;line-height:1.55;">Payments are <strong>non-refundable</strong> and appointments are <strong>non-cancellable</strong>. Once your payment is submitted and verified, you can <strong>no longer change your scheduled date and time</strong>.</p>
          </div>
          <label style="display:flex;align-items:flex-start;gap:9px;margin-top:12px;cursor:pointer;font-size:12.5px;color:#2d3748;line-height:1.5;">
            <input type="checkbox" id="agree-${a.id}" onchange="var b=document.getElementById('proceed-${a.id}');b.disabled=!this.checked;b.style.opacity=this.checked?'1':'0.5';b.style.cursor=this.checked?'pointer':'not-allowed';" style="margin-top:2px;width:16px;height:16px;flex-shrink:0;cursor:pointer;">
            <span>I understand and agree that my payment is non-refundable, my appointment cannot be cancelled, and I can no longer change my scheduled date and time once I have paid.</span>
          </label>
          <button id="proceed-${a.id}" disabled onclick="window.location.href='${proceedUrl}'" style="margin-top:14px;padding:12px 24px;background:#1E3A8A;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:not-allowed;opacity:0.5;">Proceed to Payment</button>
        </div>`;
    }

    function payBox(a, pay) {
      const qr = PAY_QR[pay.payment_option] || PAY_QR.full;
      const balance = (pay.payment_option === 'half' && Number(pay.outstanding_balance) > 0)
        ? `<p style="font-size:12.5px;color:#8A6A18;margin-top:4px;">Balance in person: <strong>₱${Number(pay.outstanding_balance).toFixed(2)}</strong></p>` : '';
      return `<div style="margin-top:10px;padding:16px;background:#fff;border-radius:12px;border:1px solid #e6eaf1;">

            <div style="font-size:13px;color:#2d3748;line-height:1.9;">

              <div>Mobile: <strong>${PAY_ACCT.mobile}</strong></div>

              <div>Reference: <code style="background:#EEF1FA;padding:3px 8px;border-radius:6px;font-weight:700;">${pay.reference_number}</code>
                <button onclick="copyApptRef('${pay.reference_number}')" style="margin-left:6px;padding:3px 10px;border:1.5px solid #1E3A8A;background:#fff;color:#1E3A8A;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">Copy</button></div>
              ${balance}
            </div>
          </div>
          <p style="font-size:11.5px;color:#718096;margin-top:10px;">Enter the exact amount and include your reference number in the GCash note so we can match your payment.</p>
          <div style="margin-top:12px;">
            <label style="font-size:12.5px;font-weight:700;color:#2d3748;display:block;margin-bottom:6px;">Upload proof of payment (JPG, PNG, or PDF · max 5 MB)</label>
            <label class="file-pick" for="proof-${pay.id}">
              <input type="file" id="proof-${pay.id}" accept="image/jpeg,image/png,application/pdf" style="display:none" onchange="this.closest('.file-pick').querySelector('.file-pick__name').textContent=this.files[0]?this.files[0].name:'No file chosen'">
              <span class="file-pick__btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg> Choose File</span>
              <span class="file-pick__name">No file chosen</span>
            </label>
            <div style="margin-top:10px;">
              <button onclick="uploadApptProof(${pay.id})" style="padding:10px 22px;background:linear-gradient(135deg,#1E3A8A,#15306E);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;">Submit Proof of Payment</button>
            </div>
          </div>
        </div>`;
    }

    async function startApptPayment(apptId, intakeFormId, option) {
      try {
        const res = await fetch(PAY_API, {
          method: 'POST', headers: authHeaders,
          body: JSON.stringify({ appointmentId: apptId, intakeFormId: intakeFormId || null, paymentOption: option }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Payment reference generated. Scan the QR and upload your proof.', { title: 'Reference Ready' });
          await showAppointmentModal();
        } else {
          BPSToast.error(json.message || 'Could not start payment.', { title: 'Payment Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    function copyApptRef(ref) {
      if (navigator.clipboard) navigator.clipboard.writeText(ref).then(() => BPSToast.success('Reference copied.', { duration: 1500 }), () => {});
    }

    async function uploadApptProof(paymentId) {
      const input = document.getElementById('proof-' + paymentId);
      const file = input && input.files && input.files[0];
      if (!file) { BPSToast.warning('Please choose a file to upload.', { title: 'No File Selected' }); return; }
      const allowed = ['image/jpeg', 'image/png', 'application/pdf'];
      if (!allowed.includes(file.type)) { BPSToast.error('Please upload a JPG, PNG, or PDF.', { title: 'Invalid File' }); return; }
      if (file.size > 5 * 1024 * 1024) { BPSToast.error('File must be under 5 MB.', { title: 'File Too Large' }); return; }

      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const res = await fetch(`${PAY_API}/${paymentId}/proof`, {
            method: 'POST', headers: authHeaders,
            body: JSON.stringify({ proof: reader.result, filename: file.name }),
          });
          const json = await res.json();
          if (json.success) {
            BPSToast.success('Proof submitted — your payment is now under review.', { title: 'Submitted' });
            await showAppointmentModal();
            loadNotifications();
          } else {
            BPSToast.error(json.message || 'Could not submit proof of payment.', { title: 'Upload Error' });
          }
        } catch (err) {
          BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
        }
      };
      reader.readAsDataURL(file);
    }

    // ── Teleconference Detail Modal ──────────────────────────
    async function showJoinMeetingModal(n) {
      const modal = document.getElementById('teleconf-modal');
      const body = document.getElementById('teleconf-modal-body');
      modal.classList.add('active');
      body.innerHTML = '<p style="color:#718096;">Loading meeting details...</p>';

      // The notification link is meetings.html?join=<id>&invite=<token>. We use
      // join=<id> to load the meeting details, and the single-use invite token
      // (if present) for the actual entry so the client joins via the secure
      // single-use redeem flow.
      const m  = (n && n.link) ? String(n.link).match(/join=(\d+)/) : null;
      const im = (n && n.link) ? String(n.link).match(/[?&]invite=([^&]+)/) : null;
      const sessionId  = m  ? parseInt(m[1], 10) : null;
      const inviteToken = im ? im[1] : null;

      if (!sessionId) {
        // Older notifications stored an invite-only link (no join=<id>). We can't
        // load meeting details without the id, but we can still join via the
        // single-use token.
        if (inviteToken) {
          body.innerHTML = `
            <p style="font-size:14px;color:#4a5568;margin-bottom:20px;">Your scheduled meeting is ready. Click below to join.</p>
            <div style="display:flex;justify-content:flex-end;">
              <button onclick="window.location.href='meetings.html?invite=${inviteToken}'"
                style="padding:12px 26px;background:#1E3A8A;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">
                Join Meeting →
              </button>
            </div>`;
          return;
        }
        body.innerHTML = '<p style="color:#e53e3e;">This meeting link is no longer valid.</p>';
        return;
      }

      try {
        const res = await fetch(`/api/teleconference/${sessionId}`, { headers: authHeaders });
        const json = await res.json();

        if (!json.success || !json.data) {
          body.innerHTML = '<p style="color:#a0aec0;">This meeting is no longer available.</p>';
          return;
        }

        const s = json.data;
        if (s.session_status === 'ended' || s.session_status === 'cancelled') {
          body.innerHTML = '<p style="color:#a0aec0;">This meeting has already ended.</p>';
          return;
        }

        // Prefer the single-use invite token for entry; keep join=<id> too so the
        // meetings page can open the session view (OTP first, then redeem). Fall
        // back to the normal join deep-link for staff / re-opened notifications.
        const joinHref = inviteToken
          ? `meetings.html?join=${s.id}&invite=${inviteToken}`
          : `meetings.html?join=${s.id}`;

        body.innerHTML = `
          <p style="font-size:14px;color:#4a5568;margin-bottom:6px;">Meeting</p>
          <p style="font-weight:700;font-size:16px;margin-bottom:20px;">${s.meeting_title || 'Consultation Session'} <span style="font-weight:600;color:#718096;font-size:13px;">(${s.meeting_code || ('#' + s.id)})</span></p>
          <p style="font-size:14px;color:#4a5568;margin-bottom:20px;">Your scheduled meeting is ready. Click below to join.</p>
          <div style="display:flex;justify-content:flex-end;">
            <button onclick="window.location.href='${joinHref}'"
              style="padding:12px 26px;background:#1E3A8A;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">
              Join Meeting →
            </button>
          </div>`;
      } catch (err) {
        body.innerHTML = '<p style="color:#e53e3e;">Failed to load meeting details.</p>';
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      if (id === 'appt-modal') currentApptId = null;
    }

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', function (e) {
        if (e.target === this) {
          this.classList.remove('active');
          if (this.id === 'appt-modal') currentApptId = null;
        }
      });
    });

    // Close notif delete modal on backdrop click
    document.getElementById('notif-delete-modal').addEventListener('click', function(e) {
      if (e.target === this) closeNotifDeleteModal();
    });

    // ── Inline appointment actions (Confirm / Decline / Reschedule) ──
    async function confirmAppointment(apptId) {
      try {
        const res = await fetch(`/api/appointments/${apptId}/confirm`, {
          method: 'PUT',
          headers: authHeaders,
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('Appointment confirmed! You will receive further details soon.', { title: 'Confirmed' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to confirm appointment.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    async function declineAppointment(apptId) {
      if (!await BPSModal.confirm('Are you sure you want to decline this appointment?', { title: 'Decline appointment', confirmText: 'Decline', danger: true })) return;
      try {
        const res = await fetch(`/api/appointments/${apptId}/decline`, {
          method: 'PUT',
          headers: authHeaders,
          body: JSON.stringify({ notes: 'Declined by client from notifications' }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.info('Appointment declined. Staff has been notified.', { title: 'Declined' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to decline.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    let notifCalendars = {};
    // Per-appointment schedule info (current/proposed) used to exclude those
    // exact slots from the reschedule picker. Populated in showAppointmentModal.
    let apptScheduleInfo = {};

    function toggleRescheduleInline(apptId) {
      const panel = document.getElementById(`reschedule-inline-${apptId}`);
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'block' : 'none';

      if (isHidden && !notifCalendars[apptId]) {
        // Exclude the appointment's current and newly proposed schedule so the
        // client cannot re-pick them — the proposed one is offered separately as
        // an accept/decline option above.
        const info = apptScheduleInfo[apptId] || {};
        const excludedSlots = [info.proposed, info.preferred, info.approved].filter(Boolean);
        notifCalendars[apptId] = BPSCalendar.mount(`#notif-cal-container-${apptId}`, {
          showTime: true,
          excludedSlots,
          onChange: (isoVal) => {
            document.getElementById(`new-dt-${apptId}`).value = isoVal;
          },
        });
      }
    }

    async function submitNewSchedule(apptId) {
      const input = document.getElementById(`new-dt-${apptId}`);
      const reasonEl = document.getElementById(`reschedule-reason-${apptId}`);
      const reason = reasonEl ? reasonEl.value.trim() : '';
      if (!input || !input.value) {
        BPSToast.warning('Please select a date and time.', { title: 'Missing Date' });
        return;
      }
      if (new Date(input.value) <= new Date()) {
        BPSToast.warning('Please select a future date and time.', { title: 'Invalid Date' });
        return;
      }
      if (!reason) {
        BPSToast.warning('Please provide a reason for the schedule change.', { title: 'Reason Required' });
        return;
      }
      try {
        const res = await fetch(`/api/appointments/${apptId}/request-change`, {
          method: 'PUT',
          headers: authHeaders,
          body: JSON.stringify({ new_datetime: input.value, notes: reason }),
        });
        const json = await res.json();
        if (json.success) {
          BPSToast.success('New schedule submitted! Staff will review your request.', { title: 'Schedule Requested' });
          await showAppointmentModal();
          loadNotifications(); // refresh list — auto-deleted notifications will be gone
        } else {
          BPSToast.error(json.message || 'Failed to submit new schedule.', { title: 'Error' });
        }
      } catch (err) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
      }
    }

    // ── Toggle View Details panel ──────────────────────────
    function toggleApptDetails(apptId) {
      const panel = document.getElementById(`appt-details-${apptId}`);
      if (panel) {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    }

    // ── Bulk select helpers ───────────────────────────────
    function getVisibleNotifIds() {
      const search = document.getElementById('search-input').value.toLowerCase();
      let visible = notifications;
      if (activeFilter !== 'all') visible = visible.filter(n => n.category === activeFilter);
      if (search) visible = visible.filter(n =>
        n.title.toLowerCase().includes(search) || n.text.toLowerCase().includes(search)
      );
      return visible.map(n => n.id);
    }

    function toggleSelectionMode() {
      notifSelectionMode = !notifSelectionMode;
      const btn = document.getElementById('btn-select-notif');
      if (notifSelectionMode) {
        btn.textContent = 'Cancel';
        btn.classList.add('active');
      } else {
        btn.textContent = 'Select';
        btn.classList.remove('active');
        selectedNotifs.clear();
      }
      updateBulkBarNotif();
      renderNotifications();
    }

    function toggleSelectAllNotifs(checked) {
      const visibleIds = getVisibleNotifIds();
      if (checked) visibleIds.forEach(id => selectedNotifs.add(id));
      else visibleIds.forEach(id => selectedNotifs.delete(id));
      updateBulkBarNotif();
      renderNotifications();
    }

    function toggleNotifSelect(id, checked) {
      if (checked) selectedNotifs.add(id);
      else selectedNotifs.delete(id);
      updateBulkBarNotif();
    }

    function updateBulkBarNotif() {
      const bar = document.getElementById('notif-bulk-bar');
      const count = selectedNotifs.size;
      document.getElementById('notif-sel-count').textContent = `${count} selected`;
      // Bar visible whenever selection mode is on
      if (notifSelectionMode) bar.classList.add('visible');
      else bar.classList.remove('visible');
      // Delete button only when something is selected
      const delBtn = document.getElementById('btn-delete-sel-notif');
      if (delBtn) delBtn.style.display = count > 0 ? '' : 'none';
      // Sync Select All checkbox
      const selectAllCb = document.getElementById('notif-select-all');
      if (selectAllCb) {
        const visibleIds = getVisibleNotifIds();
        const allSelected = visibleIds.length > 0 && visibleIds.every(id => selectedNotifs.has(id));
        selectAllCb.checked = allSelected;
        selectAllCb.indeterminate = count > 0 && !allSelected;
      }
    }

    function confirmBulkDeleteNotif() {
      if (selectedNotifs.size === 0) return;
      const n = selectedNotifs.size;
      document.getElementById('notif-delete-msg').textContent =
        `${n} notification${n > 1 ? 's' : ''} will be permanently deleted and cannot be recovered.`;
      document.getElementById('notif-delete-modal').classList.add('active');
    }

    function closeNotifDeleteModal() {
      document.getElementById('notif-delete-modal').classList.remove('active');
    }

    async function executeBulkDeleteNotif() {
      closeNotifDeleteModal();
      const ids = [...selectedNotifs];
      await Promise.all(ids.map(id =>
        fetch(`${API_BASE}/${id}`, { method: 'DELETE', headers: authHeaders }).catch(() => {})
      ));
      notifications = notifications.filter(n => !ids.includes(n.id));
      selectedNotifs.clear();
      notifSelectionMode = false;
      const btn = document.getElementById('btn-select-notif');
      btn.textContent = 'Select';
      btn.classList.remove('active');
      updateBulkBarNotif();
      updateCounts();
      renderNotifications();
      BPSToast.success(`${ids.length} notification${ids.length > 1 ? 's' : ''} deleted.`, { title: 'Deleted' });
    }

    // ── Filter tabs ───────────────────────────────────────
    document.getElementById('notif-filters').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      renderNotifications();
    });

    // ── Search ────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', renderNotifications);

    // ── Mark all as read button ───────────────────────────
    document.getElementById('mark-all-read').addEventListener('click', markAllRead);

    // ── Init ──────────────────────────────────────────────
    buildFilterTabs();   // role-aware tabs (clients have no Reports; everyone gets Tickets)
    loadNotifications();

    // ── Polling: check for new notifications every 30s ────
    let lastUnreadCount = -1;
    setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/unread-count`, { headers: authHeaders });
        if (!res.ok) return;
        const json = await res.json();
        const newCount = json.data?.count ?? 0;
        if (lastUnreadCount >= 0 && newCount !== lastUnreadCount) {
          // Count changed — reload full list
          loadNotifications();
        }
        lastUnreadCount = newCount;
      } catch (_) { /* silent */ }
    }, 30000);
  </script>
  <script src="navbar.js"></script>
</body>

</html>
