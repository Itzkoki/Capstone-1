<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Barcarse Psychological Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="toast.css">
  <style>
    .pay-wrap { max-width: 640px; margin: 110px auto 60px; padding: 0 20px; font-family: 'Inter', sans-serif; }
    .pay-card { background: #fff; border: 1px solid #e6eaf1; border-radius: 18px; box-shadow: 0 10px 40px rgba(20,30,60,.08); overflow: hidden; }
    .pay-head { background: linear-gradient(135deg, #1E3A8A 0%, #15306E 55%, #0B6E3B 100%); color: #fff; padding: 26px 32px; display: flex; align-items: center; gap: 16px; }
    .pay-head img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; background: rgba(255,255,255,.15); }
    .pay-head__title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 800; line-height: 1.2; }
    .pay-head__sub { font-size: 12px; font-weight: 500; opacity: .85; margin-top: 2px; }
    .pay-body { padding: 28px 32px; }
    .pay-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 800; color: #1a202c; margin-bottom: 4px; }
    .pay-sub { font-size: 13px; color: #718096; margin-bottom: 22px; }
    .info-box { background: #f7f9fc; border: 1px solid #e6eaf1; border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
    .info-row { display: flex; justify-content: space-between; gap: 12px; font-size: 13.5px; padding: 4px 0; }
    .info-label { color: #718096; font-weight: 500; }
    .info-value { color: #1a202c; font-weight: 600; text-align: right; }
    .info-value code { background: #EEF1FA; padding: 2px 8px; border-radius: 6px; font-weight: 700; font-family: 'Courier New', monospace; }
    .section-head { font-size: 14px; font-weight: 700; color: #15306E; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
    .section-head::before { content: ''; display: block; width: 3px; height: 16px; background: linear-gradient(#1E3A8A, #0B6E3B); border-radius: 2px; }
    .qr-row { display: flex; gap: 22px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 20px; }
    .qr-img { width: 190px; height: 190px; border-radius: 14px; border: 1px solid #e6eaf1; object-fit: contain; background: #fff; }
    .qr-detail { font-size: 13.5px; color: #2d3748; line-height: 2.1; flex: 1; min-width: 200px; }
    .qr-detail .amt { color: #1E3A8A; font-size: 20px; font-weight: 800; }
    .upload-section { background: #FAFBFF; border: 1.5px dashed #c7d2fe; border-radius: 12px; padding: 20px; margin-top: 4px; }
    .upload-section label { font-size: 12.5px; font-weight: 700; color: #2d3748; display: block; margin-bottom: 8px; }
    .upload-section input[type=file] { font-size: 13px; display: block; margin-bottom: 6px; }
    .upload-section .hint { font-size: 12px; color: #718096; }
    .ref-field { margin-top: 14px; }
    .ref-field label { font-size: 12.5px; font-weight: 700; color: #2d3748; display: block; margin-bottom: 6px; }
    .ref-field input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 9px; font-size: 13.5px; font-family: 'Inter', sans-serif; box-sizing: border-box; }
    .submit-btn { margin-top: 22px; width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #1E3A8A, #15306E); color: #fff; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; }
    .success-state { text-align: center; padding: 32px 20px; }
    .success-state .icon { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .success-state h3 { font-size: 20px; font-weight: 700; color: #1a202c; margin-bottom: 8px; }
    .success-state p { font-size: 13.5px; color: #718096; line-height: 1.6; margin-bottom: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: #15306E; font-weight: 600; text-decoration: none; padding: 10px 18px; background: #EEF1FA; border-radius: 9px; }
    .back-link:hover { background: #dce3f7; }
    .error-state { text-align: center; padding: 40px 20px; color: #718096; }
    #pay-loading { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="landingpage.html" class="navbar__brand">
      <div class="navbar__logo"><img src="barcarse logo.jpg" alt="Barcarse logo" class="hero__illustration"></div>
      <span class="navbar__title">Barcarse Psychological Services</span>
    </a>
    <div class="navbar__right">
      <ul class="navbar__links" id="nav-links"></ul>
      <a href="login.html" class="navbar__cta" id="navbar-cta">Get Started
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </a>
      <a href="notifications.html" class="navbar__notif" id="navbar-notif" title="Notifications">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="navbar__notif-badge" id="notif-badge">0</span>
      </a>
      <a href="profile.html" class="navbar__profile" id="navbar-profile" title="My Profile">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </a>
    </div>
  </nav>

  <div class="toast" id="toast"></div>
  <div class="pay-wrap">
    <div class="pay-card">
      <div class="pay-head">
        <img src="barcarse logo.jpg" alt="Barcarse logo">
        <div>
          <div class="pay-head__title">Barcarse Psychological Services</div>
          <div class="pay-head__sub">Report Request Payment</div>
        </div>
      </div>
      <div class="pay-body" id="pay-body">
        <div id="pay-loading">Loading payment details&hellip;</div>
      </div>
    </div>
  </div>

  <script src="session.js"></script>
  <script src="toast.js"></script>
  <script>
    const API = 'http://localhost:5000/api';
    const token = BPSSession.getToken();
    const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    const PAY_QR = 'qr-full-payment.jpg';
    const PAY_ACCT = { name: 'JO*N YE*J B.', mobile: '0905 664 \u2022\u2022\u2022\u2022' };

    if (!token) { window.location.href = 'login.html'; }

    const requestId = new URLSearchParams(location.search).get('request');
    if (!requestId) { window.location.href = 'profile.html?section=requests'; }

    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function peso(n) { return '\u20b1' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file);
      });
    }

    async function loadRequest() {
      try {
        const res = await fetch(API + '/requests/' + requestId, { headers: authHeaders });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const json = await res.json();
        if (!json.success) { showError('Ticket not found or access denied.'); return; }
        render(json.data);
      } catch (e) {
        showError('Could not load payment details. Please try again.');
      }
    }

    function showError(msg) {
      document.getElementById('pay-body').innerHTML = `<div class="error-state"><p>${esc(msg)}</p><a href="profile.html?section=requests" class="back-link">&larr; Back to My Tickets</a></div>`;
    }

    function render(t) {
      const body = document.getElementById('pay-body');

      // If payment already submitted or verified, show appropriate state
      if (t.payment_status === 'under_review') {
        body.innerHTML = `<div class="success-state">
          <div class="icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="#16a34a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
          <h3>Payment Submitted</h3>
          <p>Your proof of payment for ticket <strong>${esc(t.ticket_number)}</strong> has been submitted and is awaiting verification by our team.</p>
          <a href="profile.html?section=requests" class="back-link">&larr; Back to My Tickets</a>
        </div>`;
        return;
      }
      if (t.payment_status === 'verified') {
        body.innerHTML = `<div class="success-state">
          <div class="icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="#16a34a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
          <h3>Payment Verified</h3>
          <p>Your payment for ticket <strong>${esc(t.ticket_number)}</strong> has been verified. Your report is being prepared.</p>
          <a href="profile.html?section=requests" class="back-link">&larr; Back to My Tickets</a>
        </div>`;
        return;
      }

      const isRejected = t.payment_status === 'rejected';

      body.innerHTML = `
        <div class="pay-title">Complete Payment</div>
        <div class="pay-sub">Please scan the QR code and upload your proof of payment below.</div>

        <div class="section-head">Request Details</div>
        <div class="info-box">
          <div class="info-row"><span class="info-label">Ticket Number</span><span class="info-value"><code>${esc(t.ticket_number)}</code></span></div>
          <div class="info-row"><span class="info-label">Request Type</span><span class="info-value">${esc(t.request_type_label || t.nature)}</span></div>
          <div class="info-row"><span class="info-label">Amount Due</span><span class="info-value" style="color:#1E3A8A;font-size:16px;">${peso(t.payment_amount)}</span></div>
          <div class="info-row"><span class="info-label">Reference</span><span class="info-value"><code>${esc(t.payment_reference || t.ticket_number + '-PAY')}</code></span></div>
        </div>

        ${isRejected ? `<div style="background:#FEE2E2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#991B1B;">
          <strong>&#x26A0; Your previous proof of payment was not accepted.</strong>
          ${t.payment_rejection_reason ? '<div style="margin-top:4px;">Reason: ' + esc(t.payment_rejection_reason) + '</div>' : ''}
          Please upload a new proof of payment.
        </div>` : ''}

        <div class="section-head">GCash Payment</div>
        <div class="qr-row">
          <img src="${esc(PAY_QR)}" alt="GCash QR Code" class="qr-img">
          <div class="qr-detail">
            <div>Pay to: <strong>${esc(PAY_ACCT.name)}</strong></div>
            <div>Mobile: <strong>${esc(PAY_ACCT.mobile)}</strong></div>
            <div>Amount: <span class="amt">${peso(t.payment_amount)}</span></div>
            <div>Reference: <code>${esc(t.payment_reference || t.ticket_number + '-PAY')}</code></div>
          </div>
        </div>

        <div class="section-head">Upload Proof of Payment</div>
        <div class="upload-section">
          <label>Screenshot or photo of your GCash receipt *</label>
          <input type="file" id="proof-file" accept="image/jpeg,image/png,application/pdf">
          <div class="hint">JPG, PNG, or PDF &mdash; max 5&nbsp;MB</div>
        </div>

        <div class="ref-field">
          <label>GCash Reference Number (optional)</label>
          <input type="text" id="gcash-ref" maxlength="60" placeholder="e.g. 1234567890">
        </div>

        <button class="submit-btn" id="submit-proof-btn" onclick="submitProof(${t.id})">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Submit Proof of Payment
        </button>
        <div style="text-align:center;margin-top:16px;">
          <a href="profile.html?section=requests" class="back-link">&larr; Back to My Tickets</a>
        </div>
      `;
    }

    async function submitProof(id) {
      const input = document.getElementById('proof-file');
      const file = input && input.files && input.files[0];
      if (!file) { BPSToast.warning('Please choose a proof of payment file first.', { title: 'No File' }); return; }
      if (!['image/jpeg','image/png','application/pdf'].includes(file.type)) { BPSToast.error('Proof must be a JPG, PNG, or PDF.', { title: 'Invalid File' }); return; }
      if (file.size > 5 * 1024 * 1024) { BPSToast.error('File must be under 5 MB.', { title: 'Too Large' }); return; }

      const btn = document.getElementById('submit-proof-btn');
      btn.disabled = true; btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> Submitting\u2026';

      try {
        const dataUrl = await readFileAsDataUrl(file);
        const res = await fetch(`${API}/requests/${id}/payment-proof`, {
          method: 'POST', headers: authHeaders,
          body: JSON.stringify({ proof: dataUrl, filename: file.name }),
        });
        const json = await res.json();
        if (json.success) {
          document.getElementById('pay-body').innerHTML = `<div class="success-state">
            <div class="icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="#16a34a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
            <h3>Payment Submitted!</h3>
            <p>Your proof of payment has been received. Our team will verify it shortly and you will be notified.</p>
            <a href="profile.html?section=requests" class="back-link">&larr; Back to My Tickets</a>
          </div>`;
        } else {
          BPSToast.error(json.message || 'Upload failed. Please try again.', { title: 'Error' });
          btn.disabled = false;
          btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Submit Proof of Payment';
        }
      } catch (e) {
        BPSToast.error('Network error. Please try again.', { title: 'Connection Error' });
        btn.disabled = false;
        btn.textContent = 'Submit Proof of Payment';
      }
    }

    loadRequest();
  </script>
  <script>if (sessionStorage.getItem('bps_logged_in') === 'true') document.body.classList.add('logged-in');</script>
  <script src="navbar.js"></script>
</body>
</html>
