  <link rel="stylesheet" href="verify-otp.css">
  <link rel="stylesheet" href="design-system.css">

</head>
<body class="auth-page">

  <!-- ===== OTP VERIFICATION CARD ===== -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-card__title">Enter OTP</h1>
      <p class="auth-card__subtitle">Enter the 6-digit code sent to <a href="#" id="user-email">name@company.com</a></p>

      <div class="otp-spam-note" style="display:flex;gap:8px;align-items:flex-start;background:#fffaf0;border:1px solid #fbd38d;color:#9c5b15;border-radius:8px;padding:10px 12px;margin:0 0 18px;font-size:0.86rem;line-height:1.45;text-align:left;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="flex-shrink:0;margin-top:1px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span>If the verification code is not visible in your inbox, please check your <strong>Spam</strong> or <strong>Junk</strong> folder.</span>
      </div>

      <form id="otp-form" novalidate>
        <!-- 6 individual OTP digit boxes -->
        <div class="otp-inputs" id="otp-inputs">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-1" aria-label="Digit 1" autocomplete="one-time-code">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-2" aria-label="Digit 2">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-3" aria-label="Digit 3">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-4" aria-label="Digit 4">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-5" aria-label="Digit 5">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp-6" aria-label="Digit 6">
        </div>

        <div class="otp-resend">
          Didn't receive code? <a href="#" id="resend-link" class="disabled">Click to resend in <span id="countdown">30</span>s</a>
        </div>

        <button type="submit" class="auth-btn" id="verify-btn">Verify OTP</button>

        <div class="otp-status" id="otp-status"></div>
      </form>

      <div class="auth-footer">
        Back to <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    // ── Configuration ──────────────────────────────────
    const API_BASE = '/api/auth';
    const RESEND_COOLDOWN = 120; // seconds (2-minute resend rate limit)

    // ── DOM Elements ───────────────────────────────────
    const otpInputs = document.querySelectorAll('.otp-inputs input');
    const otpForm = document.getElementById('otp-form');
    const verifyBtn = document.getElementById('verify-btn');
    const statusEl = document.getElementById('otp-status');
    const resendLink = document.getElementById('resend-link');
    const countdownEl = document.getElementById('countdown');
    const userEmailEl = document.getElementById('user-email');

    // ── Populate email from registration (masked for display) ───────────────
    function maskEmail(email) {
      const s = String(email || '');
      const at = s.indexOf('@');
      if (at < 1) return s;
      const local = s.slice(0, at);
      const domain = s.slice(at + 1);
      const shown = local.slice(0, 2);
      return `${shown}${'•'.repeat(Math.max(3, local.length - 2))}@${domain}`;
    }
    const storedUser = JSON.parse(sessionStorage.getItem('bps_user') || '{}');
    const userEmail = storedUser.email || 'name@company.com';   // full address — used for API calls
    userEmailEl.textContent = maskEmail(userEmail);             // masked — shown to the user

    // ── OTP Input Behavior ─────────────────────────────
    otpInputs.forEach((input, index) => {
      // Only allow single digit
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(0, 1);

        // Remove error state on typing
        e.target.classList.remove('error');

        // Add filled state
        if (val) {
          e.target.classList.add('filled');
          // Auto-focus next input
          if (index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        } else {
          e.target.classList.remove('filled');
        }
      });

      // Handle backspace navigation
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
          otpInputs[index - 1].value = '';
          otpInputs[index - 1].classList.remove('filled');
        }
        // Arrow key navigation
        if (e.key === 'ArrowLeft' && index > 0) {
          e.preventDefault();
          otpInputs[index - 1].focus();
        }
        if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
          e.preventDefault();
          otpInputs[index + 1].focus();
        }
      });

      // Handle paste — always fill from the first box regardless of focus position
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        const digits = pasteData.split('').slice(0, 6);
        digits.forEach((digit, i) => {
          otpInputs[i].value = digit;
          otpInputs[i].classList.add('filled');
          otpInputs[i].classList.remove('error');
        });
        // Clear any remaining inputs beyond the pasted length
        for (let i = digits.length; i < otpInputs.length; i++) {
          otpInputs[i].value = '';
          otpInputs[i].classList.remove('filled');
        }
        // Focus the next empty box or the last box
        const nextEmpty = Array.from(otpInputs).findIndex(inp => !inp.value);
        if (nextEmpty !== -1) otpInputs[nextEmpty].focus();
        else otpInputs[otpInputs.length - 1].focus();
      });

      // Select content on focus
      input.addEventListener('focus', () => {
        input.select();
      });
    });

    // ── Get OTP value from all boxes ───────────────────
    function getOTP() {
      return Array.from(otpInputs).map(i => i.value).join('');
    }

    // ── Show status message ────────────────────────────
    // Plain text by default (textContent — XSS-safe for server/error messages).
    // Pass isHtml=true only for trusted, static markup (e.g. the success icon).
    function showStatus(message, type, isHtml) {
      if (isHtml) statusEl.innerHTML = message;
      else statusEl.textContent = message;
      statusEl.className = 'otp-status ' + type;
    }

    function clearStatus() {
      statusEl.className = 'otp-status';
      statusEl.textContent = '';
    }

    // ── Shake error animation ──────────────────────────
    function showInputError() {
      otpInputs.forEach(input => {
        input.classList.add('error');
      });
      setTimeout(() => {
        otpInputs.forEach(input => input.classList.remove('error'));
      }, 600);
    }

    // ── Form Submit — Verify OTP ───────────────────────
    otpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const otp = getOTP();

      // Validate all 6 digits entered
      if (otp.length < 6) {
        showInputError();
        showStatus('Please enter all 6 digits of your verification code.', 'error');
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';

      try {
        const res = await fetch(`${API_BASE}/verify-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, otp }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showStatus('<svg viewBox="0 0 24 24" width="16" height="16" style="fill:#0A5C31;vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Email verified successfully! Redirecting to login...', 'success', true);
          otpInputs.forEach(input => {
            input.disabled = true;
            input.classList.add('filled');
          });
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showInputError();
          showStatus(data.message || 'Invalid verification code. Please try again.', 'error');
          verifyBtn.disabled = false;
          verifyBtn.textContent = 'Verify OTP';
        }
      } catch (err) {
        showStatus('Unable to connect to server. Please try again later.', 'error');
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify OTP';
      }
    });

    // ── Resend Countdown Timer ─────────────────────────
    let resendTimer;

    function startCountdown(initial) {
      let seconds = initial || RESEND_COOLDOWN;
      clearInterval(resendTimer);
      resendLink.classList.add('disabled');
      countdownEl.textContent = seconds;

      // Show the countdown text
      resendLink.innerHTML = `Click to resend in <span id="countdown">${seconds}</span>s`;

      resendTimer = setInterval(() => {
        seconds--;
        const cdEl = document.getElementById('countdown');
        if (cdEl) cdEl.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(resendTimer);
          resendLink.classList.remove('disabled');
          resendLink.innerHTML = 'Resend code';
        }
      }, 1000);
    }

    // The first resend is allowed immediately; the 2-minute cooldown timer only
    // starts after the user clicks Resend (matches the OTP workflow).
    resendLink.classList.remove('disabled');
    resendLink.innerHTML = 'Resend code';

    // ── Resend OTP ─────────────────────────────────────
    resendLink.addEventListener('click', async (e) => {
      e.preventDefault();
      if (resendLink.classList.contains('disabled')) return;

      clearStatus();
      resendLink.innerHTML = 'Sending...';

      try {
        const res = await fetch(`${API_BASE}/resend-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showStatus('A new verification code has been sent to your email.', 'success');
          // Clear inputs only on a successful resend.
          otpInputs.forEach(input => {
            input.value = '';
            input.classList.remove('filled', 'error');
          });
          otpInputs[0].focus();
          startCountdown(data.retryAfter || RESEND_COOLDOWN);
        } else {
          showStatus(data.message || 'Failed to resend code.', 'error');
          // If the server is rate-limiting, restart the timer for the remaining wait.
          startCountdown(data.retryAfter || RESEND_COOLDOWN);
        }
      } catch (err) {
        showStatus('Unable to connect to server.', 'error');
        resendLink.classList.remove('disabled');
        resendLink.innerHTML = 'Resend code';
      }
    });

    // ── Auto-focus first input on load ─────────────────
    otpInputs[0].focus();
  </script>
</body>
</html>
